<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" fill="none">
  <!-- Empty neatly folded bags -->
  <rect x="100" y="30" width="120" height="35" rx="3" fill="#F8FAFC" stroke="#94A3B8" stroke-width="1"/>
  <line x1="100" y1="48" x2="220" y2="48" stroke="#94A3B8" stroke-width="0.6" opacity="0.5"/>
  <!-- Fold lines -->
  <path d="M100,30 Q160,25 220,30" stroke="#94A3B8" stroke-width="0.8" fill="none" opacity="0.4"/>
  <text x="160" y="45" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#64748B" opacity="0.5">READY</text>
  <!-- Small folded flap on top -->
  <path d="M130,30 Q160,22 190,30 L185,26 Q160,18 135,26 Z" fill="#E2E8F0" stroke="#94A3B8" stroke-width="0.7" opacity="0.6"/>
</svg>
