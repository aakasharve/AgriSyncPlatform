<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" fill="none">
  <!-- HDPE woven bag, red-stripe, torn top, grain spilling -->
  <rect x="40" y="15" width="240" height="50" rx="4" fill="#DC2626" opacity="0.15"/>
  <!-- Woven crosshatch texture -->
  <rect x="40" y="15" width="240" height="50" rx="4" fill="none" stroke="#DC2626" stroke-width="1.5"/>
  <line x1="40" y1="25" x2="280" y2="25" stroke="#DC2626" stroke-width="0.8" opacity="0.3"/>
  <line x1="40" y1="35" x2="280" y2="35" stroke="#DC2626" stroke-width="0.8" opacity="0.3"/>
  <line x1="40" y1="45" x2="280" y2="45" stroke="#DC2626" stroke-width="0.8" opacity="0.3"/>
  <line x1="40" y1="55" x2="280" y2="55" stroke="#DC2626" stroke-width="0.8" opacity="0.3"/>
  <!-- Vertical stripes -->
  <line x1="80" y1="15" x2="80" y2="65" stroke="#DC2626" stroke-width="0.8" opacity="0.3"/>
  <line x1="160" y1="15" x2="160" y2="65" stroke="#DC2626" stroke-width="0.8" opacity="0.3"/>
  <line x1="240" y1="15" x2="240" y2="65" stroke="#DC2626" stroke-width="0.8" opacity="0.3"/>
  <!-- Devanagari text -->
  <text x="160" y="44" text-anchor="middle" font-family="Noto Sans Devanagari, sans-serif" font-size="11" fill="#991B1B" opacity="0.7">ज्ञान खत</text>
  <!-- Torn top edge -->
  <path d="M40,15 Q55,10 70,16 Q85,5 100,14 Q115,8 130,15 Q145,6 160,14 Q175,8 190,15 Q205,5 220,14 Q235,9 250,15 Q265,6 280,15" stroke="#991B1B" stroke-width="1.5" fill="none" opacity="0.7"/>
  <!-- Spilling grain particles -->
  <circle cx="100" cy="72" r="1.5" fill="#D97706" opacity="0.6"/>
  <circle cx="120" cy="76" r="1" fill="#D97706" opacity="0.5"/>
  <circle cx="145" cy="74" r="2" fill="#D97706" opacity="0.55"/>
  <circle cx="170" cy="78" r="1.5" fill="#F59E0B" opacity="0.5"/>
  <circle cx="195" cy="73" r="1" fill="#D97706" opacity="0.45"/>
  <circle cx="215" cy="77" r="1.8" fill="#F59E0B" opacity="0.5"/>
</svg>
