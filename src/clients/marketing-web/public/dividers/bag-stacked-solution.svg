<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" fill="none">
  <!-- Neatly stacked green/white bags -->
  <rect x="60" y="35" width="200" height="30" rx="4" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <rect x="70" y="20" width="180" height="30" rx="4" fill="#D1FAE5" stroke="#059669" stroke-width="1.5"/>
  <rect x="80" y="8" width="160" height="26" rx="4" fill="#A7F3D0" stroke="#059669" stroke-width="1.5"/>
  <!-- Stripe lines -->
  <line x1="60" y1="50" x2="260" y2="50" stroke="#059669" stroke-width="0.6" opacity="0.3"/>
  <line x1="70" y1="33" x2="250" y2="33" stroke="#059669" stroke-width="0.6" opacity="0.3"/>
  <text x="160" y="25" text-anchor="middle" font-family="Noto Sans Devanagari, sans-serif" font-size="10" fill="#065F46" opacity="0.8">श्रमसफल उपाय</text>
</svg>
