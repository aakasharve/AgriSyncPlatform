<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <!-- Subtle organic green -->
    <linearGradient id="rowGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#059669" stop-opacity="0.06" />
      <stop offset="100%" stop-color="#047857" stop-opacity="0.08" />
    </linearGradient>
  </defs>

  <!-- Aerial view of organized crop rows - very subtle for background use -->

  <!-- Horizontal crop rows with organic variation -->
  <g stroke="#059669" fill="none" opacity="0.07">
    <!-- Row 1 -->
    <path d="M0,15 Q25,13 50,15 Q75,17 100,15 Q125,13 150,15 Q175,17 200,15" stroke-width="2" />
    <!-- Row 2 -->
    <path d="M0,35 Q30,33 60,35 Q90,37 120,35 Q150,33 180,35 Q195,36 200,35" stroke-width="1.8" />
    <!-- Row 3 -->
    <path d="M0,55 Q20,53 40,55 Q70,57 100,55 Q130,53 160,55 Q185,57 200,55" stroke-width="2.2" />
    <!-- Row 4 -->
    <path d="M0,75 Q35,73 70,75 Q100,77 130,75 Q160,73 190,75 Q198,76 200,75" stroke-width="1.6" />
    <!-- Row 5 -->
    <path d="M0,95 Q22,93 44,95 Q72,97 100,95 Q128,93 156,95 Q184,97 200,95" stroke-width="2" />
    <!-- Row 6 -->
    <path d="M0,115 Q28,113 56,115 Q84,117 112,115 Q140,113 168,115 Q192,117 200,115" stroke-width="1.8" />
    <!-- Row 7 -->
    <path d="M0,135 Q18,133 36,135 Q64,137 100,135 Q136,133 164,135 Q188,137 200,135" stroke-width="2.2" />
    <!-- Row 8 -->
    <path d="M0,155 Q32,153 64,155 Q96,157 128,155 Q160,153 192,155 Q198,156 200,155" stroke-width="1.6" />
    <!-- Row 9 -->
    <path d="M0,175 Q24,173 48,175 Q76,177 104,175 Q132,173 160,175 Q188,177 200,175" stroke-width="2" />
    <!-- Row 10 -->
    <path d="M0,195 Q30,193 60,195 Q90,197 120,195 Q150,193 180,195 Q196,196 200,195" stroke-width="1.8" />
  </g>

  <!-- Subtle crop dots along rows -->
  <g fill="#059669" opacity="0.04">
    <!-- Row 1 dots -->
    <circle cx="20" cy="15" r="2.5" />
    <circle cx="50" cy="15" r="3" />
    <circle cx="80" cy="15" r="2.5" />
    <circle cx="110" cy="15" r="3" />
    <circle cx="140" cy="15" r="2.5" />
    <circle cx="170" cy="15" r="3" />

    <!-- Row 3 dots -->
    <circle cx="10" cy="55" r="3" />
    <circle cx="40" cy="55" r="2.5" />
    <circle cx="70" cy="55" r="3" />
    <circle cx="100" cy="55" r="2.5" />
    <circle cx="130" cy="55" r="3" />
    <circle cx="160" cy="55" r="2.5" />
    <circle cx="190" cy="55" r="3" />

    <!-- Row 5 dots -->
    <circle cx="20" cy="95" r="2.5" />
    <circle cx="50" cy="95" r="3" />
    <circle cx="80" cy="95" r="2.5" />
    <circle cx="110" cy="95" r="3" />
    <circle cx="140" cy="95" r="2.5" />
    <circle cx="170" cy="95" r="3" />

    <!-- Row 7 dots -->
    <circle cx="10" cy="135" r="3" />
    <circle cx="40" cy="135" r="2.5" />
    <circle cx="70" cy="135" r="3" />
    <circle cx="100" cy="135" r="2.5" />
    <circle cx="130" cy="135" r="3" />
    <circle cx="160" cy="135" r="2.5" />
    <circle cx="190" cy="135" r="3" />

    <!-- Row 9 dots -->
    <circle cx="20" cy="175" r="2.5" />
    <circle cx="50" cy="175" r="3" />
    <circle cx="80" cy="175" r="2.5" />
    <circle cx="110" cy="175" r="3" />
    <circle cx="140" cy="175" r="2.5" />
    <circle cx="170" cy="175" r="3" />
  </g>

  <!-- Very subtle cross-hatching for field texture -->
  <g stroke="#2d8a4e" stroke-width="0.5" opacity="0.03" fill="none">
    <line x1="0" y1="0" x2="200" y2="200" />
    <line x1="40" y1="0" x2="200" y2="160" />
    <line x1="80" y1="0" x2="200" y2="120" />
    <line x1="120" y1="0" x2="200" y2="80" />
    <line x1="160" y1="0" x2="200" y2="40" />
    <line x1="0" y1="40" x2="160" y2="200" />
    <line x1="0" y1="80" x2="120" y2="200" />
    <line x1="0" y1="120" x2="80" y2="200" />
    <line x1="0" y1="160" x2="40" y2="200" />
  </g>

  <!-- Subtle irrigation channel markers -->
  <g stroke="#7DD3FC" stroke-width="0.5" opacity="0.04" fill="none" stroke-dasharray="3,8">
    <line x1="100" y1="0" x2="100" y2="200" />
    <line x1="0" y1="100" x2="200" y2="100" />
  </g>
</svg>