<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="seed1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#059669" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#10B981" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="seed2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D89B1D" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#F59E0B" stop-opacity="0.06"/>
    </linearGradient>
  </defs>

  <!-- Seed shapes scattered in a repeating pattern -->
  <!-- Green seeds -->
  <ellipse cx="30" cy="40" rx="4" ry="7" fill="url(#seed1)" transform="rotate(-30, 30, 40)"/>
  <ellipse cx="150" cy="25" rx="3" ry="6" fill="url(#seed1)" transform="rotate(15, 150, 25)"/>
  <ellipse cx="80" cy="160" rx="3.5" ry="6.5" fill="url(#seed1)" transform="rotate(-20, 80, 160)"/>
  <ellipse cx="170" cy="130" rx="4" ry="7" fill="url(#seed1)" transform="rotate(25, 170, 130)"/>

  <!-- Amber/gold seeds -->
  <ellipse cx="100" cy="60" rx="3" ry="5.5" fill="url(#seed2)" transform="rotate(40, 100, 60)"/>
  <ellipse cx="40" cy="130" rx="3.5" ry="6" fill="url(#seed2)" transform="rotate(-15, 40, 130)"/>
  <ellipse cx="160" cy="180" rx="3" ry="5" fill="url(#seed2)" transform="rotate(10, 160, 180)"/>

  <!-- Tiny leaf shapes -->
  <path d="M120,100 C125,92 130,95 128,102 C126,108 120,108 120,100 Z" fill="#059669" opacity="0.08"/>
  <path d="M50,80 C55,72 60,75 58,82 C56,88 50,88 50,80 Z" fill="#D89B1D" opacity="0.06"/>
  <path d="M140,60 C145,52 150,55 148,62 C146,68 140,68 140,60 Z" fill="#059669" opacity="0.07"/>

  <!-- Dots (pollen) -->
  <circle cx="70" cy="30" r="2" fill="#059669" opacity="0.08"/>
  <circle cx="180" cy="90" r="1.5" fill="#D89B1D" opacity="0.06"/>
  <circle cx="20" cy="180" r="2" fill="#059669" opacity="0.07"/>
  <circle cx="130" cy="140" r="1.5" fill="#F59E0B" opacity="0.05"/>
  <circle cx="90" cy="110" r="2" fill="#059669" opacity="0.06"/>
</svg>