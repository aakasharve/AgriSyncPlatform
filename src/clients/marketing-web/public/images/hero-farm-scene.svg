<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 800" width="1920" height="800">
  <defs>
    <!-- Sky gradient - bright warm golden hour -->
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#60A5FA" />
      <stop offset="20%" stop-color="#93C5FD" />
      <stop offset="40%" stop-color="#BFDBFE" />
      <stop offset="55%" stop-color="#FDE68A" />
      <stop offset="70%" stop-color="#FCD34D" />
      <stop offset="85%" stop-color="#FBBF24" />
      <stop offset="100%" stop-color="#F59E0B" />
    </linearGradient>

    <!-- Sun glow -->
    <radialGradient id="sunGlow" cx="75%" cy="55%" r="25%">
      <stop offset="0%" stop-color="#FCD34D" stop-opacity="0.9" />
      <stop offset="30%" stop-color="#F59E0B" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#F59E0B" stop-opacity="0" />
    </radialGradient>

    <!-- Field greens -->
    <linearGradient id="fieldGreen1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2d8a4e" />
      <stop offset="100%" stop-color="#1a5c2c" />
    </linearGradient>
    <linearGradient id="fieldGreen2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#059669" />
      <stop offset="100%" stop-color="#047857" />
    </linearGradient>
    <linearGradient id="fieldGreen3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#34d399" />
      <stop offset="100%" stop-color="#2d8a4e" />
    </linearGradient>
    <linearGradient id="fieldGold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#92400E" />
      <stop offset="50%" stop-color="#b45309" />
      <stop offset="100%" stop-color="#78350F" />
    </linearGradient>

    <!-- Mountain gradient -->
    <linearGradient id="mountainGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e3a5f" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#2d8a4e" stop-opacity="0.4" />
    </linearGradient>
    <linearGradient id="mountainGrad2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a5c2c" stop-opacity="0.5" />
      <stop offset="100%" stop-color="#059669" stop-opacity="0.3" />
    </linearGradient>

    <!-- Hill silhouette gradient -->
    <linearGradient id="hillGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a5c2c" />
      <stop offset="100%" stop-color="#14532d" />
    </linearGradient>

    <!-- Bottom overlay - warm light haze instead of dark -->
    <linearGradient id="bottomOverlay" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0" />
      <stop offset="50%" stop-color="#FFFBEB" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.4" />
    </linearGradient>

    <!-- Texture noise filter -->
    <filter id="noiseFilter" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch" result="noise" />
      <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise" />
      <feBlend in="SourceGraphic" in2="grayNoise" mode="multiply" result="blended" />
      <feComponentTransfer in="blended">
        <feFuncA type="linear" slope="1" />
      </feComponentTransfer>
    </filter>

    <!-- Subtle grain overlay -->
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" stitchTiles="stitch" />
      <feColorMatrix type="saturate" values="0" />
      <feBlend in="SourceGraphic" mode="soft-light" />
    </filter>

    <!-- Haze filter for atmosphere -->
    <filter id="haze">
      <feGaussianBlur stdDeviation="2" />
    </filter>

    <!-- Irrigation line pattern -->
    <pattern id="irrigationPattern" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <line x1="0" y1="20" x2="40" y2="20" stroke="#7DD3FC" stroke-width="0.5" stroke-opacity="0.3" stroke-dasharray="2,6" />
    </pattern>

    <!-- Crop row pattern -->
    <pattern id="cropRows" x="0" y="0" width="16" height="16" patternUnits="userSpaceOnUse">
      <rect width="16" height="16" fill="none" />
      <circle cx="8" cy="4" r="2.5" fill="#1a5c2c" opacity="0.3" />
      <circle cx="8" cy="12" r="2" fill="#14532d" opacity="0.2" />
    </pattern>

    <!-- Tree shape -->
    <clipPath id="treeClip">
      <ellipse cx="0" cy="-15" rx="12" ry="18" />
    </clipPath>
  </defs>

  <!-- Sky -->
  <rect width="1920" height="800" fill="url(#skyGrad)" />

  <!-- Sun glow -->
  <rect width="1920" height="800" fill="url(#sunGlow)" />

  <!-- Clouds - wispy, golden hour -->
  <g opacity="0.25">
    <ellipse cx="300" cy="120" rx="180" ry="25" fill="#FCD34D" />
    <ellipse cx="350" cy="115" rx="120" ry="18" fill="#fff" opacity="0.5" />
    <ellipse cx="800" cy="80" rx="220" ry="20" fill="#BFDBFE" opacity="0.3" />
    <ellipse cx="850" cy="75" rx="140" ry="14" fill="#fff" opacity="0.4" />
    <ellipse cx="1400" cy="140" rx="160" ry="22" fill="#FCD34D" opacity="0.6" />
    <ellipse cx="1450" cy="135" rx="100" ry="15" fill="#fff" opacity="0.3" />
    <ellipse cx="1700" cy="95" rx="130" ry="18" fill="#BFDBFE" opacity="0.2" />
  </g>

  <!-- Distant mountains - layer 1 (furthest) -->
  <path d="M0,380 Q120,280 250,330 Q380,260 500,310 Q600,250 720,290 Q850,220 960,280 Q1080,210 1200,260 Q1320,200 1440,250 Q1550,190 1680,240 Q1800,200 1920,260 L1920,450 L0,450 Z" fill="url(#mountainGrad)" />

  <!-- Distant mountains - layer 2 -->
  <path d="M0,400 Q100,330 220,370 Q350,300 480,350 Q620,290 760,340 Q900,280 1040,330 Q1180,270 1300,320 Q1420,280 1560,310 Q1700,270 1800,300 Q1860,290 1920,310 L1920,470 L0,470 Z" fill="url(#mountainGrad2)" />

  <!-- Mid hills -->
  <path d="M0,440 Q160,380 320,420 Q500,370 680,410 Q820,360 960,400 Q1120,350 1280,390 Q1400,360 1520,380 Q1680,350 1800,370 Q1860,365 1920,375 L1920,500 L0,500 Z" fill="url(#hillGrad)" opacity="0.7" />

  <!-- Tree line on hills -->
  <g fill="#14532d" opacity="0.85">
    <!-- Left cluster -->
    <ellipse cx="80" cy="432" rx="14" ry="22" />
    <ellipse cx="100" cy="430" rx="16" ry="25" />
    <ellipse cx="122" cy="433" rx="13" ry="20" />
    <ellipse cx="140" cy="435" rx="11" ry="18" />
    <rect x="78" y="445" width="4" height="12" fill="#78350F" opacity="0.6" />
    <rect x="98" y="448" width="4" height="12" fill="#78350F" opacity="0.6" />
    <rect x="120" y="446" width="4" height="12" fill="#78350F" opacity="0.6" />
    <rect x="138" y="447" width="3" height="10" fill="#78350F" opacity="0.6" />

    <!-- Center-left cluster -->
    <ellipse cx="480" cy="405" rx="18" ry="28" />
    <ellipse cx="505" cy="402" rx="20" ry="32" />
    <ellipse cx="530" cy="407" rx="15" ry="24" />
    <rect x="478" y="425" width="4" height="14" fill="#78350F" opacity="0.6" />
    <rect x="503" y="428" width="5" height="16" fill="#78350F" opacity="0.6" />
    <rect x="528" y="424" width="4" height="13" fill="#78350F" opacity="0.6" />

    <!-- Center cluster -->
    <ellipse cx="960" cy="395" rx="16" ry="26" />
    <ellipse cx="985" cy="392" rx="18" ry="30" />
    <ellipse cx="1008" cy="396" rx="14" ry="23" />
    <rect x="958" y="415" width="4" height="12" fill="#78350F" opacity="0.6" />
    <rect x="983" y="418" width="4" height="14" fill="#78350F" opacity="0.6" />

    <!-- Right cluster -->
    <ellipse cx="1500" cy="375" rx="17" ry="27" />
    <ellipse cx="1525" cy="372" rx="20" ry="30" />
    <ellipse cx="1548" cy="376" rx="14" ry="22" />
    <ellipse cx="1570" cy="378" rx="12" ry="19" />
    <rect x="1498" y="396" width="4" height="13" fill="#78350F" opacity="0.6" />
    <rect x="1523" y="398" width="5" height="15" fill="#78350F" opacity="0.6" />
    <rect x="1546" y="394" width="4" height="12" fill="#78350F" opacity="0.6" />

    <!-- Far right -->
    <ellipse cx="1820" cy="368" rx="15" ry="24" />
    <ellipse cx="1845" cy="365" rx="18" ry="28" />
    <ellipse cx="1868" cy="370" rx="13" ry="21" />
  </g>

  <!-- Main field area - background layer -->
  <path d="M0,500 Q480,460 960,480 Q1440,460 1920,490 L1920,800 L0,800 Z" fill="url(#fieldGreen1)" />

  <!-- Field sections with perspective crop rows -->
  <!-- Left field - darker green -->
  <path d="M0,500 Q240,470 480,490 L480,800 L0,800 Z" fill="#1a5c2c" />

  <!-- Left field crop rows -->
  <g stroke="#14532d" stroke-width="1" opacity="0.4">
    <line x1="0" y1="520" x2="460" y2="500" />
    <line x1="0" y1="545" x2="465" y2="515" />
    <line x1="0" y1="570" x2="468" y2="530" />
    <line x1="0" y1="595" x2="470" y2="545" />
    <line x1="0" y1="620" x2="472" y2="560" />
    <line x1="0" y1="645" x2="474" y2="575" />
    <line x1="0" y1="670" x2="476" y2="590" />
    <line x1="0" y1="695" x2="478" y2="605" />
    <line x1="0" y1="720" x2="479" y2="620" />
    <line x1="0" y1="745" x2="480" y2="640" />
    <line x1="0" y1="770" x2="480" y2="660" />
  </g>

  <!-- Center-left field - medium green -->
  <path d="M480,490 Q720,470 960,480 L960,800 L480,800 Z" fill="#2d8a4e" />

  <!-- Center-left crop rows (diagonal for perspective) -->
  <g stroke="#1a5c2c" stroke-width="1.2" opacity="0.35">
    <path d="M500,490 Q600,510 720,570 Q820,620 960,680" fill="none" />
    <path d="M520,490 Q620,520 740,590 Q840,640 960,700" fill="none" />
    <path d="M540,490 Q640,530 760,610 Q860,660 960,720" fill="none" />
    <path d="M560,492 Q660,540 780,625 Q880,680 960,740" fill="none" />
    <path d="M580,494 Q680,550 800,640 Q880,690 960,755" fill="none" />
    <path d="M600,496 Q700,560 820,655 Q900,710 960,770" fill="none" />
    <path d="M620,498 Q720,565 840,665 Q910,720 960,780" fill="none" />
    <path d="M650,500 Q740,570 850,670 Q920,725 960,790" fill="none" />
  </g>

  <!-- Center-right field - bright green -->
  <path d="M960,480 Q1200,460 1440,475 L1440,800 L960,800 Z" fill="#059669" />

  <!-- Center-right crop rows -->
  <g stroke="#047857" stroke-width="1" opacity="0.4">
    <line x1="960" y1="480" x2="1440" y2="475" />
    <line x1="960" y1="510" x2="1440" y2="500" />
    <line x1="960" y1="540" x2="1440" y2="525" />
    <line x1="960" y1="570" x2="1440" y2="550" />
    <line x1="960" y1="600" x2="1440" y2="575" />
    <line x1="960" y1="630" x2="1440" y2="600" />
    <line x1="960" y1="660" x2="1440" y2="625" />
    <line x1="960" y1="690" x2="1440" y2="650" />
    <line x1="960" y1="720" x2="1440" y2="680" />
    <line x1="960" y1="750" x2="1440" y2="710" />
    <line x1="960" y1="780" x2="1440" y2="740" />
  </g>

  <!-- Right field - golden/harvested -->
  <path d="M1440,475 Q1680,465 1920,490 L1920,800 L1440,800 Z" fill="url(#fieldGold)" />

  <!-- Right field crop stubble rows -->
  <g stroke="#78350F" stroke-width="0.8" opacity="0.3">
    <line x1="1440" y1="490" x2="1920" y2="500" />
    <line x1="1440" y1="520" x2="1920" y2="530" />
    <line x1="1440" y1="550" x2="1920" y2="560" />
    <line x1="1440" y1="580" x2="1920" y2="590" />
    <line x1="1440" y1="610" x2="1920" y2="620" />
    <line x1="1440" y1="640" x2="1920" y2="650" />
    <line x1="1440" y1="670" x2="1920" y2="680" />
    <line x1="1440" y1="700" x2="1920" y2="710" />
    <line x1="1440" y1="730" x2="1920" y2="740" />
    <line x1="1440" y1="760" x2="1920" y2="770" />
  </g>

  <!-- Irrigation channels -->
  <g stroke="#7DD3FC" stroke-opacity="0.35" stroke-width="1.5" fill="none">
    <!-- Main channel -->
    <path d="M0,560 Q480,530 960,550 Q1440,530 1920,560" />
    <!-- Branch channels -->
    <path d="M480,530 L480,800" stroke-dasharray="4,8" />
    <path d="M960,550 L960,800" stroke-dasharray="4,8" />
    <path d="M1440,535 L1440,800" stroke-dasharray="4,8" />
    <!-- Secondary horizontal -->
    <path d="M0,660 Q480,640 960,650 Q1440,630 1920,655" stroke-dasharray="3,6" stroke-opacity="0.2" />
  </g>

  <!-- Dirt path/road -->
  <path d="M700,800 Q720,700 750,620 Q800,530 900,490 Q920,485 940,482" fill="none" stroke="#92400E" stroke-width="8" opacity="0.3" />
  <path d="M700,800 Q720,700 750,620 Q800,530 900,490 Q920,485 940,482" fill="none" stroke="#b45309" stroke-width="4" opacity="0.2" />

  <!-- Tractor silhouette in mid-ground -->
  <g transform="translate(820, 505) scale(0.6)" opacity="0.7">
    <!-- Tractor body -->
    <rect x="0" y="-30" width="50" height="25" rx="3" fill="#1a1a1a" />
    <!-- Engine hood -->
    <rect x="45" y="-25" width="30" height="18" rx="2" fill="#1a1a1a" />
    <!-- Exhaust -->
    <rect x="70" y="-38" width="3" height="13" fill="#1a1a1a" />
    <!-- Cab -->
    <rect x="5" y="-52" width="30" height="22" rx="3" fill="#1a1a1a" />
    <!-- Cab window -->
    <rect x="8" y="-49" width="24" height="14" rx="2" fill="#3b6fa0" opacity="0.4" />
    <!-- Back wheel -->
    <circle cx="15" cy="2" r="16" fill="#1a1a1a" />
    <circle cx="15" cy="2" r="12" fill="#2a2a2a" />
    <circle cx="15" cy="2" r="4" fill="#1a1a1a" />
    <!-- Front wheel -->
    <circle cx="62" cy="0" r="10" fill="#1a1a1a" />
    <circle cx="62" cy="0" r="7" fill="#2a2a2a" />
    <circle cx="62" cy="0" r="3" fill="#1a1a1a" />
    <!-- Wheel spokes hint -->
    <line x1="15" y1="-10" x2="15" y2="14" stroke="#1a1a1a" stroke-width="1.5" />
    <line x1="3" y1="2" x2="27" y2="2" stroke="#1a1a1a" stroke-width="1.5" />
  </g>

  <!-- Field edge trees - foreground left -->
  <g transform="translate(50, 600)" opacity="0.9">
    <rect x="-3" y="-5" width="6" height="40" fill="#5c3a1e" />
    <ellipse cx="0" cy="-25" rx="22" ry="30" fill="#14532d" />
    <ellipse cx="-8" cy="-20" rx="15" ry="22" fill="#1a5c2c" />
    <ellipse cx="10" cy="-18" rx="14" ry="20" fill="#1a5c2c" />
  </g>

  <!-- Field edge trees - foreground right -->
  <g transform="translate(1870, 580)" opacity="0.85">
    <rect x="-3" y="-5" width="6" height="45" fill="#5c3a1e" />
    <ellipse cx="0" cy="-28" rx="25" ry="34" fill="#14532d" />
    <ellipse cx="-10" cy="-22" rx="16" ry="24" fill="#1a5c2c" />
    <ellipse cx="12" cy="-20" rx="15" ry="22" fill="#1a5c2c" />
  </g>

  <!-- Scattered crop dots for texture in fields -->
  <g fill="#1a5c2c" opacity="0.15">
    <circle cx="120" cy="560" r="3" />
    <circle cx="180" cy="575" r="2.5" />
    <circle cx="250" cy="550" r="3.5" />
    <circle cx="310" cy="590" r="2" />
    <circle cx="380" cy="565" r="3" />
    <circle cx="200" cy="620" r="2.5" />
    <circle cx="280" cy="640" r="3" />
    <circle cx="350" cy="660" r="2" />
    <circle cx="100" cy="680" r="3.5" />
    <circle cx="420" cy="610" r="2.5" />
  </g>
  <g fill="#047857" opacity="0.12">
    <circle cx="1000" cy="530" r="3" />
    <circle cx="1080" cy="545" r="2.5" />
    <circle cx="1160" cy="520" r="3.5" />
    <circle cx="1240" cy="560" r="2" />
    <circle cx="1320" cy="535" r="3" />
    <circle cx="1060" cy="600" r="2.5" />
    <circle cx="1140" cy="620" r="3" />
    <circle cx="1220" cy="580" r="2" />
    <circle cx="1380" cy="570" r="3.5" />
    <circle cx="1100" cy="650" r="2.5" />
  </g>

  <!-- Birds in distance -->
  <g stroke="#1a1a1a" stroke-width="1.5" fill="none" opacity="0.15">
    <path d="M600,180 Q605,175 610,180 Q615,175 620,180" />
    <path d="M640,160 Q644,156 648,160 Q652,156 656,160" />
    <path d="M580,200 Q583,197 586,200 Q589,197 592,200" />
    <path d="M1300,150 Q1305,145 1310,150 Q1315,145 1320,150" />
    <path d="M1340,170 Q1343,167 1346,170 Q1349,167 1352,170" />
  </g>

  <!-- Sun disc -->
  <circle cx="1420" cy="320" r="60" fill="#FCD34D" opacity="0.85" />
  <circle cx="1420" cy="320" r="42" fill="#FDE68A" opacity="0.6" />
  <circle cx="1420" cy="320" r="25" fill="#fff" opacity="0.4" />

  <!-- Atmospheric haze layer over mountains -->
  <rect x="0" y="300" width="1920" height="200" fill="url(#sunGlow)" opacity="0.15" />

  <!-- Grain/texture overlay -->
  <rect width="1920" height="800" fill="none" filter="url(#grain)" opacity="0.06" />

  <!-- Bottom gradient overlay for text readability -->
  <rect x="0" y="400" width="1920" height="400" fill="url(#bottomOverlay)" />
</svg>