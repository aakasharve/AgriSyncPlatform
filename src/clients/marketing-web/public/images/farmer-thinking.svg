<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 560" width="400" height="560">
  <defs>
    <!-- Skin gradient -->
    <linearGradient id="skin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C68B59" />
      <stop offset="100%" stop-color="#A67C52" />
    </linearGradient>
    <!-- Turban gradient -->
    <linearGradient id="turban-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E8A838" />
      <stop offset="50%" stop-color="#D97706" />
      <stop offset="100%" stop-color="#B45309" />
    </linearGradient>
    <!-- Kurta -->
    <linearGradient id="kurta-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FAFAF9" />
      <stop offset="100%" stop-color="#F5F5F4" />
    </linearGradient>
    <!-- Subtle shadow -->
    <filter id="soft-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6" />
      <feOffset dx="0" dy="4" result="shadow" />
      <feFlood flood-color="#78350F" flood-opacity="0.12" />
      <feComposite in2="shadow" operator="in" />
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <g filter="url(#soft-shadow)">
    <!-- === BODY: White Kurta === -->
    <path d="M130,540 L118,310 Q118,255 165,240 L200,235 L235,240 Q282,255 282,310 L270,540 Z"
          fill="url(#kurta-grad)" />
    <!-- Kurta fold lines -->
    <path d="M175,280 Q190,380 175,540" fill="none" stroke="#E7E5E4" stroke-width="1.2" opacity="0.6" />
    <path d="M225,280 Q210,380 225,540" fill="none" stroke="#E7E5E4" stroke-width="1.2" opacity="0.6" />
    <!-- V-neck -->
    <path d="M178,242 L200,270 L222,242" fill="none" stroke="#D6D3D1" stroke-width="1.8" stroke-linejoin="round" />

    <!-- === LEFT ARM (hanging, slightly tense) === -->
    <path d="M118,310 Q88,370 95,440 Q98,470 110,480"
          fill="none" stroke="url(#kurta-grad)" stroke-width="38" stroke-linecap="round" />
    <!-- Left hand (fist, tense) -->
    <g transform="translate(108, 475)">
      <ellipse rx="14" ry="16" fill="url(#skin)" />
      <path d="M-8,-4 Q0,-10 8,-4" fill="none" stroke="#8B6A4A" stroke-width="0.8" opacity="0.4" />
    </g>

    <!-- === RIGHT ARM (raised to forehead) === -->
    <path d="M282,310 Q320,270 305,210 Q290,160 248,142"
          fill="none" stroke="url(#kurta-grad)" stroke-width="38" stroke-linecap="round" />
    <!-- Kurta sleeve shadow -->
    <path d="M282,310 Q310,280 305,230"
          fill="none" stroke="#E7E5E4" stroke-width="1" opacity="0.5" />

    <!-- === NECK === -->
    <rect x="186" y="200" width="28" height="42" rx="4" fill="url(#skin)" />

    <!-- === HEAD === -->
    <g id="head">
      <!-- Face shape -->
      <path d="M162,125 Q158,200 175,218 Q188,228 200,230 Q212,228 225,218 Q242,200 238,125 Z"
            fill="url(#skin)" />

      <!-- Ears -->
      <ellipse cx="160" cy="165" rx="9" ry="12" fill="#B8885A" />
      <ellipse cx="240" cy="165" rx="9" ry="12" fill="#B8885A" />
      <ellipse cx="160" cy="165" rx="5" ry="7" fill="#A67C52" />
      <ellipse cx="240" cy="165" rx="5" ry="7" fill="#A67C52" />

      <!-- === FACIAL FEATURES (stressed, thoughtful) === -->
      <!-- Eyebrows (furrowed, angled inward) -->
      <path d="M175,148 Q185,140 198,146" fill="none" stroke="#4A3728" stroke-width="2.5" stroke-linecap="round" />
      <path d="M202,146 Q215,140 225,148" fill="none" stroke="#4A3728" stroke-width="2.5" stroke-linecap="round" />
      <!-- Furrow wrinkle between brows -->
      <path d="M196,143 L198,138 L200,143 L202,138 L204,143" fill="none" stroke="#8B6A4A" stroke-width="0.8" opacity="0.5" />

      <!-- Eyes (slightly squinted, stressed) -->
      <path d="M178,158 Q185,153 192,158" fill="none" stroke="#1C1917" stroke-width="2" stroke-linecap="round" />
      <path d="M208,158 Q215,153 222,158" fill="none" stroke="#1C1917" stroke-width="2" stroke-linecap="round" />
      <!-- Dark circles under eyes (stress indicator) -->
      <path d="M180,162 Q185,166 192,162" fill="none" stroke="#8B6A4A" stroke-width="0.6" opacity="0.35" />
      <path d="M208,162 Q215,166 222,162" fill="none" stroke="#8B6A4A" stroke-width="0.6" opacity="0.35" />

      <!-- Nose -->
      <path d="M200,155 L198,178 Q194,186 200,188 Q206,186 204,184"
            fill="none" stroke="#8B6A4A" stroke-width="1.5" stroke-linecap="round" />

      <!-- Mouth (tight, tense) -->
      <path d="M190,202 Q195,199 200,200 Q205,199 210,202"
            fill="none" stroke="#6B5040" stroke-width="1.5" stroke-linecap="round" />
      <!-- Slight frown lines -->
      <path d="M186,204 Q188,207 190,205" fill="none" stroke="#8B6A4A" stroke-width="0.6" opacity="0.4" />

      <!-- Stubble dots (mature farmer) -->
      <g fill="#6B5040" opacity="0.15">
        <circle cx="188" cy="210" r="0.8" />
        <circle cx="193" cy="214" r="0.8" />
        <circle cx="200" cy="216" r="0.8" />
        <circle cx="207" cy="214" r="0.8" />
        <circle cx="212" cy="210" r="0.8" />
        <circle cx="196" cy="212" r="0.7" />
        <circle cx="204" cy="212" r="0.7" />
      </g>

      <!-- === TURBAN (Maharashtrian Pheta) === -->
      <g id="pheta">
        <!-- Base turban dome -->
        <path d="M155,128 Q155,68 200,55 Q245,68 245,128"
              fill="url(#turban-grad)" />
        <!-- Lower band wrapping forehead -->
        <path d="M152,118 Q148,132 165,140 L235,140 Q252,132 248,118 Z"
              fill="#B45309" />
        <!-- Fold texture lines -->
        <path d="M165,85 Q200,75 235,85" fill="none" stroke="#92400E" stroke-width="1.2" opacity="0.4" />
        <path d="M160,100 Q200,92 240,100" fill="none" stroke="#92400E" stroke-width="1.2" opacity="0.4" />
        <path d="M155,115 Q200,108 245,115" fill="none" stroke="#92400E" stroke-width="1" opacity="0.3" />
        <!-- Turban peak/knot on right -->
        <path d="M240,80 Q255,70 258,85 Q258,100 248,108"
              fill="#D97706" stroke="#B45309" stroke-width="0.8" />
      </g>
    </g>

    <!-- === RIGHT HAND ON FOREHEAD === -->
    <g transform="translate(230, 135)">
      <!-- Palm on forehead -->
      <path d="M-5,5 Q-15,-5 -20,5 Q-25,15 -15,20 L15,20 Q25,15 20,5 Q15,-5 5,5 Z"
            fill="url(#skin)" />
      <!-- Finger separation lines -->
      <path d="M-10,8 L-10,18" fill="none" stroke="#8B6A4A" stroke-width="0.6" opacity="0.35" />
      <path d="M-2,6 L-2,18" fill="none" stroke="#8B6A4A" stroke-width="0.6" opacity="0.35" />
      <path d="M6,6 L6,18" fill="none" stroke="#8B6A4A" stroke-width="0.6" opacity="0.35" />
    </g>
  </g>

  <!-- === THOUGHT FRAGMENTS (floating, fading away) === -->
  <!-- These small shapes represent memories escaping -->
  <g opacity="0.25">
    <!-- Fragment 1 -->
    <rect x="40" y="60" width="45" height="8" rx="2" fill="#78350F" transform="rotate(-8, 62, 64)" />
    <rect x="40" y="72" width="32" height="5" rx="2" fill="#78350F" opacity="0.5" transform="rotate(-8, 56, 74)" />
    <!-- Fragment 2 -->
    <rect x="310" y="85" width="50" height="8" rx="2" fill="#059669" transform="rotate(5, 335, 89)" />
    <rect x="318" y="97" width="35" height="5" rx="2" fill="#059669" opacity="0.5" transform="rotate(5, 335, 99)" />
    <!-- Fragment 3 (fading more) -->
    <rect x="55" y="120" width="38" height="6" rx="2" fill="#DC2626" opacity="0.6" transform="rotate(-3, 74, 123)" />
    <!-- Fragment 4 -->
    <rect x="320" y="170" width="42" height="8" rx="2" fill="#D97706" transform="rotate(7, 341, 174)" />
  </g>
</svg>