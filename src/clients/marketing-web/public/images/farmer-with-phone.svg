<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" fill="none">
  <defs>
    <!-- Skin: warm brown, sun-touched -->
    <linearGradient id="fw-skin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C4956A"/>
      <stop offset="100%" stop-color="#A67B5B"/>
    </linearGradient>
    <linearGradient id="fw-skin-dark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A67B5B"/>
      <stop offset="100%" stop-color="#8B6545"/>
    </linearGradient>
    <!-- Shirt: faded cotton off-white -->
    <linearGradient id="fw-shirt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EDE8DF"/>
      <stop offset="100%" stop-color="#D6CFBF"/>
    </linearGradient>
    <!-- Trousers: worn khaki -->
    <linearGradient id="fw-trouser" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8B7D6B"/>
      <stop offset="100%" stop-color="#73685A"/>
    </linearGradient>
    <!-- Phone screen -->
    <linearGradient id="fw-screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F0FDF4"/>
      <stop offset="100%" stop-color="#DCFCE7"/>
    </linearGradient>
    <!-- Gamcha (towel) -->
    <linearGradient id="fw-gamcha" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#E8C170"/>
      <stop offset="50%" stop-color="#D4A748"/>
      <stop offset="100%" stop-color="#E8C170"/>
    </linearGradient>
    <!-- Subtle shadow -->
    <filter id="fw-shadow" x="-10%" y="-5%" width="120%" height="115%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#3D2B1F" flood-opacity="0.15"/>
    </filter>
    <!-- Grain texture -->
    <filter id="fw-grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="gray"/>
      <feBlend in="SourceGraphic" in2="gray" mode="multiply" result="blend"/>
      <feComponentTransfer in="blend">
        <feFuncA type="linear" slope="0.06"/>
      </feComponentTransfer>
      <feComposite in="SourceGraphic" in2="blend" operator="over"/>
    </filter>
  </defs>

  <!-- Soft warm glow behind figure -->
  <ellipse cx="195" cy="280" rx="120" ry="160" fill="#C4956A" opacity="0.04"/>

  <!-- FARMER FIGURE — adult proportions, 7-head ratio, grounded stance -->
  <g transform="translate(95, 18)" filter="url(#fw-shadow)">

    <!-- === FEET / CHAPPALS === -->
    <!-- Left foot -->
    <path d="M58,435 C50,435 42,438 40,442 C38,446 42,449 55,449 C65,449 70,446 68,442 C66,438 62,435 58,435Z" fill="#5C4A3A"/>
    <path d="M44,441 L55,435 L62,441" stroke="#7A6555" stroke-width="1" fill="none"/>
    <!-- Right foot -->
    <path d="M108,437 C100,437 92,440 90,444 C88,448 92,451 105,451 C115,451 120,448 118,444 C116,440 112,437 108,437Z" fill="#5C4A3A"/>
    <path d="M94,443 L105,437 L112,443" stroke="#7A6555" stroke-width="1" fill="none"/>

    <!-- === LEGS / TROUSERS === -->
    <!-- Left leg -->
    <path d="M60,310 C58,340 56,370 55,400 C54,415 56,430 58,435" stroke="url(#fw-trouser)" stroke-width="22" fill="none" stroke-linecap="round"/>
    <!-- Right leg — slightly weight-shifted forward -->
    <path d="M105,308 C106,340 107,370 108,400 C109,418 108,432 108,437" stroke="url(#fw-trouser)" stroke-width="22" fill="none" stroke-linecap="round"/>
    <!-- Trouser waist area -->
    <path d="M48,300 C48,295 60,290 82,290 C104,290 116,295 116,300 L115,315 C115,320 100,325 82,325 C64,325 49,320 49,315Z" fill="url(#fw-trouser)"/>

    <!-- === TORSO / SHIRT === -->
    <!-- Main body — broader shoulders, natural taper -->
    <path d="M38,130
             C34,150 32,180 33,210
             L35,290
             C35,298 55,305 82,305
             C109,305 129,298 129,290
             L131,210
             C132,180 130,150 126,130
             C118,115 95,108 82,108
             C69,108 46,115 38,130Z" fill="url(#fw-shirt)"/>

    <!-- Shirt collar — open, relaxed -->
    <path d="M62,112 C66,120 72,125 82,126 C92,125 98,120 102,112" stroke="#B8AD9E" stroke-width="1.2" fill="none"/>
    <path d="M67,112 L72,128" stroke="#B8AD9E" stroke-width="0.8" fill="none"/>
    <path d="M97,112 L92,128" stroke="#B8AD9E" stroke-width="0.8" fill="none"/>

    <!-- Visible collarbone area / neck base -->
    <path d="M67,112 C72,116 92,116 97,112" fill="url(#fw-skin-dark)"/>

    <!-- Shirt wrinkles — natural fabric folds -->
    <path d="M50,170 C55,175 60,172" stroke="#B8AD9E" stroke-width="0.6" fill="none" opacity="0.5"/>
    <path d="M45,210 C55,215 58,212" stroke="#B8AD9E" stroke-width="0.6" fill="none" opacity="0.4"/>
    <path d="M110,180 C115,184 118,180" stroke="#B8AD9E" stroke-width="0.6" fill="none" opacity="0.5"/>
    <path d="M90,240 C100,238 105,242" stroke="#B8AD9E" stroke-width="0.6" fill="none" opacity="0.4"/>

    <!-- Sleeve rolled up on left arm -->
    <path d="M33,148 C30,148 28,152 30,156 C32,160 38,160 40,156" stroke="#B8AD9E" stroke-width="1" fill="url(#fw-shirt)"/>
    <!-- Sleeve rolled up on right arm -->
    <path d="M131,148 C134,148 136,152 134,156 C132,160 126,160 124,156" stroke="#B8AD9E" stroke-width="1" fill="url(#fw-shirt)"/>

    <!-- === GAMCHA on left shoulder === -->
    <path d="M38,135 C28,140 22,160 25,180 C26,190 28,195 32,200"
          stroke="url(#fw-gamcha)" stroke-width="6" fill="none" stroke-linecap="round" opacity="0.85"/>
    <path d="M34,135 C38,145 40,160 38,175"
          stroke="url(#fw-gamcha)" stroke-width="5" fill="none" stroke-linecap="round" opacity="0.7"/>
    <!-- Gamcha stripes -->
    <line x1="30" y1="155" x2="26" y2="175" stroke="#C49030" stroke-width="0.8" opacity="0.4"/>
    <line x1="35" y1="150" x2="32" y2="168" stroke="#C49030" stroke-width="0.8" opacity="0.4"/>

    <!-- === LEFT ARM (at side, relaxed) === -->
    <!-- Upper arm -->
    <path d="M38,140 C28,160 22,185 20,210" stroke="url(#fw-skin)" stroke-width="14" fill="none" stroke-linecap="round"/>
    <!-- Forearm (sun-darker) -->
    <path d="M20,210 C19,230 20,250 24,265" stroke="url(#fw-skin-dark)" stroke-width="12" fill="none" stroke-linecap="round"/>
    <!-- Left hand — natural, slightly open, working hand -->
    <path d="M24,265 C22,270 20,275 22,278 C24,280 28,278 30,274 C31,272 30,268 28,266"
          fill="url(#fw-skin-dark)" stroke="#8B6545" stroke-width="0.5"/>
    <!-- Fingers suggestion -->
    <path d="M22,278 C20,282 21,284 23,283" stroke="#8B6545" stroke-width="0.7" fill="none"/>
    <path d="M26,276 C25,281 26,283 28,282" stroke="#8B6545" stroke-width="0.7" fill="none"/>

    <!-- === RIGHT ARM (holding phone at chest height) === -->
    <!-- Upper arm -->
    <path d="M126,140 C136,155 142,170 144,185" stroke="url(#fw-skin)" stroke-width="14" fill="none" stroke-linecap="round"/>
    <!-- Forearm bent to hold phone -->
    <path d="M144,185 C142,195 135,205 130,212" stroke="url(#fw-skin-dark)" stroke-width="12" fill="none" stroke-linecap="round"/>

    <!-- === PHONE (held at chest level, angled slightly) === -->
    <g transform="translate(118, 185) rotate(-8)">
      <!-- Phone body -->
      <rect width="34" height="58" rx="5" fill="#1C1917"/>
      <rect x="1" y="1" width="32" height="56" rx="4" stroke="#374151" stroke-width="0.5" fill="none"/>
      <!-- Screen -->
      <rect x="3" y="7" width="28" height="44" rx="2" fill="url(#fw-screen)"/>
      <!-- Status bar -->
      <rect x="3" y="7" width="28" height="4" rx="2" fill="#059669" opacity="0.25"/>
      <!-- ShramSafal content lines -->
      <rect x="6" y="15" width="16" height="2" rx="1" fill="#059669" opacity="0.35"/>
      <rect x="6" y="20" width="22" height="1.5" rx="0.75" fill="#6B7280" opacity="0.2"/>
      <rect x="6" y="24" width="18" height="1.5" rx="0.75" fill="#6B7280" opacity="0.2"/>
      <!-- Checkmark -->
      <circle cx="17" cy="34" r="5" fill="#059669" opacity="0.12"/>
      <path d="M14,34 L16,36 L20,31" stroke="#059669" stroke-width="1.2" fill="none" stroke-linecap="round"/>
      <!-- Bottom content -->
      <rect x="6" y="42" width="20" height="1.5" rx="0.75" fill="#6B7280" opacity="0.2"/>
      <rect x="6" y="46" width="14" height="1.5" rx="0.75" fill="#6B7280" opacity="0.2"/>
      <!-- Notch -->
      <rect x="11" y="2" width="12" height="3" rx="1.5" fill="#2D2D2D"/>
    </g>

    <!-- Right hand gripping phone -->
    <path d="M128,210 C126,215 124,220 126,224
             C128,228 132,226 134,222
             C136,218 136,214 134,210
             C132,208 130,208 128,210Z"
          fill="url(#fw-skin-dark)" stroke="#8B6545" stroke-width="0.5"/>
    <!-- Thumb on phone -->
    <path d="M136,218 C138,215 140,212 139,208" stroke="url(#fw-skin-dark)" stroke-width="4" fill="none" stroke-linecap="round"/>

    <!-- === NECK === -->
    <path d="M68,105 C68,100 72,95 82,95 C92,95 96,100 96,105"
          fill="url(#fw-skin)"/>
    <!-- Neck tendon lines -->
    <line x1="74" y1="98" x2="73" y2="108" stroke="#A67B5B" stroke-width="0.5" opacity="0.4"/>
    <line x1="90" y1="98" x2="91" y2="108" stroke="#A67B5B" stroke-width="0.5" opacity="0.4"/>

    <!-- === HEAD — adult proportions, slightly turned toward phone === -->
    <!-- Head shape — not a circle, more oval/angular jaw -->
    <path d="M58,50
             C58,32 66,20 82,20
             C98,20 106,32 106,50
             L106,65
             C106,75 102,85 96,90
             C92,93 88,95 82,95
             C76,95 72,93 68,90
             C62,85 58,75 58,65Z"
          fill="url(#fw-skin)"/>

    <!-- Forehead sun-darkening -->
    <path d="M60,42 C60,30 68,22 82,22 C96,22 104,30 104,42 L104,48 C104,48 96,45 82,45 C68,45 60,48 60,48Z"
          fill="#A67B5B" opacity="0.3"/>

    <!-- Hair — short, dark, not turban -->
    <path d="M58,45
             C58,28 66,18 82,18
             C98,18 106,28 106,45
             C106,40 100,35 82,35
             C64,35 58,40 58,45Z"
          fill="#2C1810"/>
    <!-- Hair texture lines -->
    <path d="M65,25 C70,22 80,20 90,22" stroke="#1A0F0A" stroke-width="0.5" fill="none" opacity="0.3"/>
    <path d="M62,32 C68,28 82,26 96,30" stroke="#1A0F0A" stroke-width="0.5" fill="none" opacity="0.3"/>

    <!-- Farmer cap (topi) — subtle, not every frame -->
    <!-- Omitting cap here, showing just hair for variety -->

    <!-- === FACE — mature, serious, looking toward phone === -->

    <!-- Eyebrows — slightly furrowed in thought -->
    <path d="M66,48 C68,46 74,45 78,47" stroke="#2C1810" stroke-width="1.8" fill="none" stroke-linecap="round"/>
    <path d="M86,47 C90,45 96,46 98,48" stroke="#2C1810" stroke-width="1.8" fill="none" stroke-linecap="round"/>

    <!-- Eyes — moderate size, looking right/down toward phone -->
    <ellipse cx="72" cy="54" rx="4" ry="3" fill="white"/>
    <ellipse cx="92" cy="54" rx="4" ry="3" fill="white"/>
    <!-- Iris — looking toward phone (right and slightly down) -->
    <circle cx="74" cy="55" r="2" fill="#2C1810"/>
    <circle cx="94" cy="55" r="2" fill="#2C1810"/>
    <!-- Pupil highlight -->
    <circle cx="74.5" cy="54.5" r="0.6" fill="white"/>
    <circle cx="94.5" cy="54.5" r="0.6" fill="white"/>
    <!-- Upper eyelid line -->
    <path d="M67,52 C69,50 75,50 77,52" stroke="#5C4033" stroke-width="0.8" fill="none"/>
    <path d="M87,52 C89,50 95,50 97,52" stroke="#5C4033" stroke-width="0.8" fill="none"/>

    <!-- Nose — defined, not just a line -->
    <path d="M82,52 C83,58 84,64 82,68 C80,70 78,70 76,68"
          stroke="#8B6545" stroke-width="1" fill="none"/>
    <!-- Nostril -->
    <path d="M78,68 C77,69 78,70 80,69" stroke="#8B6545" stroke-width="0.6" fill="none"/>

    <!-- Moustache — natural, not decorative -->
    <path d="M72,72 C75,70 78,69 82,70 C86,69 89,70 92,72"
          stroke="#3D2B1F" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M74,72 C76,73 78,73 80,72" stroke="#3D2B1F" stroke-width="0.8" fill="none" opacity="0.5"/>
    <path d="M84,72 C86,73 88,73 90,72" stroke="#3D2B1F" stroke-width="0.8" fill="none" opacity="0.5"/>

    <!-- Mouth — closed, serious/thoughtful -->
    <path d="M76,78 C78,79 82,80 86,79 C88,78" stroke="#8B6545" stroke-width="1" fill="none"/>

    <!-- Jawline emphasis -->
    <path d="M60,70 C60,80 65,90 72,93" stroke="#A67B5B" stroke-width="0.6" fill="none" opacity="0.3"/>
    <path d="M104,70 C104,80 99,90 92,93" stroke="#A67B5B" stroke-width="0.6" fill="none" opacity="0.3"/>

    <!-- Ear -->
    <path d="M58,52 C54,52 52,58 54,64 C55,67 57,68 58,66"
          stroke="#A67B5B" stroke-width="1" fill="url(#fw-skin)"/>

    <!-- Subtle cheekbone shadow -->
    <ellipse cx="68" cy="66" rx="5" ry="3" fill="#A67B5B" opacity="0.1"/>
    <ellipse cx="96" cy="66" rx="5" ry="3" fill="#A67B5B" opacity="0.1"/>
  </g>

  <!-- Floating question elements — calm, not bouncy -->
  <g opacity="0.18">
    <text x="290" y="80" font-family="Georgia, serif" font-size="22" fill="#8B7D6B" font-weight="400">का?</text>
    <text x="310" y="150" font-family="Georgia, serif" font-size="18" fill="#8B7D6B" font-weight="400">काय?</text>
    <text x="50" y="130" font-family="Georgia, serif" font-size="20" fill="#A67B5B" font-weight="400">कोण?</text>
    <text x="320" y="230" font-family="Georgia, serif" font-size="16" fill="#8B7D6B" font-weight="400">कधी?</text>
    <text x="35" y="310" font-family="Georgia, serif" font-size="17" fill="#A67B5B" font-weight="400">कसं?</text>
  </g>

  <!-- Subtle info lines from phone — not radiating, just drifting -->
  <g opacity="0.08">
    <line x1="255" y1="210" x2="280" y2="200" stroke="#059669" stroke-width="1"/>
    <line x1="255" y1="220" x2="285" y2="220" stroke="#059669" stroke-width="1"/>
    <line x1="255" y1="230" x2="278" y2="240" stroke="#059669" stroke-width="1"/>
  </g>
</svg>