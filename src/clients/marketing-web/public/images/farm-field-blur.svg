<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 600" width="1920" height="600">
  <defs>
    <!-- Muted sky gradient - hazy evening -->
    <linearGradient id="blurSkyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#64748b" />
      <stop offset="30%" stop-color="#94a3b8" />
      <stop offset="60%" stop-color="#cbd5e1" />
      <stop offset="80%" stop-color="#d4c5a0" />
      <stop offset="100%" stop-color="#b8a070" />
    </linearGradient>

    <!-- Muted field gradient -->
    <linearGradient id="blurFieldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6b8a5e" />
      <stop offset="50%" stop-color="#5a7a4e" />
      <stop offset="100%" stop-color="#4a6a3e" />
    </linearGradient>

    <!-- Heavy blur filter - represents chaos/confusion -->
    <filter id="heavyBlur" x="-5%" y="-5%" width="110%" height="110%">
      <feGaussianBlur stdDeviation="6" />
    </filter>

    <!-- Medium blur -->
    <filter id="medBlur" x="-5%" y="-5%" width="110%" height="110%">
      <feGaussianBlur stdDeviation="3.5" />
    </filter>

    <!-- Light blur with desaturation -->
    <filter id="hazeFilter" x="-5%" y="-5%" width="110%" height="110%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feColorMatrix type="saturate" values="0.4" in="blur" />
    </filter>

    <!-- Dust/haze overlay -->
    <filter id="dustHaze">
      <feTurbulence type="fractalNoise" baseFrequency="0.015" numOctaves="3" seed="5" result="turbulence" />
      <feColorMatrix type="matrix" in="turbulence" values="0 0 0 0 0.7  0 0 0 0 0.65  0 0 0 0 0.5  0 0 0 0.3 0" result="dust" />
      <feBlend in="SourceGraphic" in2="dust" mode="screen" />
    </filter>

    <!-- Warm haze -->
    <radialGradient id="warmHaze" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#d4a574" stop-opacity="0.25" />
      <stop offset="60%" stop-color="#b8956a" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#8a7050" stop-opacity="0.05" />
    </radialGradient>

    <!-- Confusion overlay - muted and disorienting -->
    <linearGradient id="confusionOverlay" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#78716c" stop-opacity="0.2" />
      <stop offset="50%" stop-color="#92400E" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#44403c" stop-opacity="0.35" />
    </linearGradient>
  </defs>

  <!-- Base sky - muted -->
  <rect width="1920" height="600" fill="url(#blurSkyGrad)" />

  <!-- Blurred landscape elements -->
  <g filter="url(#heavyBlur)">
    <!-- Distant hills - blurred and indistinct -->
    <path d="M0,260 Q200,200 400,240 Q600,180 800,230 Q1000,190 1200,220 Q1400,180 1600,210 Q1750,195 1920,230 L1920,350 L0,350 Z" fill="#7a8a6a" opacity="0.6" />

    <!-- More hills -->
    <path d="M0,290 Q300,240 600,280 Q900,230 1200,270 Q1500,240 1920,280 L1920,380 L0,380 Z" fill="#6a7a5a" opacity="0.5" />
  </g>

  <!-- Blurred tree shapes -->
  <g filter="url(#medBlur)" opacity="0.5">
    <ellipse cx="200" cy="300" rx="40" ry="55" fill="#5a6a4a" />
    <ellipse cx="500" cy="280" rx="50" ry="65" fill="#4a5a3a" />
    <ellipse cx="900" cy="290" rx="35" ry="50" fill="#5a6a4a" />
    <ellipse cx="1300" cy="275" rx="45" ry="60" fill="#4a5a3a" />
    <ellipse cx="1650" cy="285" rx="40" ry="55" fill="#5a6a4a" />
  </g>

  <!-- Main blurred fields -->
  <g filter="url(#medBlur)">
    <!-- Field base -->
    <path d="M0,340 Q480,310 960,330 Q1440,310 1920,340 L1920,600 L0,600 Z" fill="url(#blurFieldGrad)" />

    <!-- Field patches - all blurred together (chaos) -->
    <path d="M0,340 Q240,320 480,350 L480,600 L0,600 Z" fill="#5a7a4e" />
    <path d="M480,350 Q720,330 960,340 L960,600 L480,600 Z" fill="#6a8a5e" />
    <path d="M960,340 Q1200,320 1440,330 L1440,600 L960,600 Z" fill="#4a6a3e" />
    <path d="M1440,330 Q1680,315 1920,340 L1920,600 L1440,600 Z" fill="#5a7a4e" />

    <!-- Crop rows that are indistinct/chaotic -->
    <g stroke="#4a5a3a" stroke-width="2" opacity="0.25">
      <path d="M0,380 Q300,370 600,395 Q900,380 1200,400 Q1500,385 1920,395" fill="none" />
      <path d="M0,420 Q400,400 800,430 Q1100,410 1500,440 Q1700,425 1920,435" fill="none" />
      <path d="M0,460 Q350,445 700,470 Q1050,450 1400,475 Q1650,460 1920,475" fill="none" />
      <path d="M0,500 Q250,490 500,510 Q800,495 1100,515 Q1400,500 1920,520" fill="none" />
      <path d="M0,540 Q300,530 600,550 Q900,535 1200,555 Q1600,540 1920,555" fill="none" />
    </g>
  </g>

  <!-- Scattered, disorganized elements (representing chaos) -->
  <g filter="url(#hazeFilter)" opacity="0.4">
    <!-- Random scattered objects -->
    <rect x="300" y="400" width="30" height="20" rx="2" fill="#78350F" transform="rotate(12, 315, 410)" />
    <rect x="800" y="450" width="25" height="15" rx="2" fill="#78350F" transform="rotate(-8, 812, 457)" />
    <rect x="1400" y="380" width="35" height="18" rx="2" fill="#78350F" transform="rotate(5, 1417, 389)" />
    <circle cx="600" cy="420" r="8" fill="#92400E" />
    <circle cx="1100" cy="440" r="6" fill="#92400E" />
    <circle cx="1700" cy="410" r="7" fill="#92400E" />
  </g>

  <!-- Warm dust haze overlay -->
  <rect width="1920" height="600" fill="url(#warmHaze)" />

  <!-- Dust particle effect -->
  <rect width="1920" height="600" fill="none" filter="url(#dustHaze)" opacity="0.5" />

  <!-- Confusion/chaos overlay -->
  <rect width="1920" height="600" fill="url(#confusionOverlay)" />

  <!-- Very subtle vignette -->
  <radialGradient id="blurVignette" cx="50%" cy="50%" r="70%">
    <stop offset="0%" stop-color="transparent" />
    <stop offset="100%" stop-color="#1a1a1a" stop-opacity="0.3" />
  </radialGradient>
  <rect width="1920" height="600" fill="url(#blurVignette)" />
</svg>