<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <defs>
    <linearGradient id="ph-skin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C4956A"/>
      <stop offset="100%" stop-color="#A67B5B"/>
    </linearGradient>
    <linearGradient id="ph-skin-dk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A67B5B"/>
      <stop offset="100%" stop-color="#8B6545"/>
    </linearGradient>
    <linearGradient id="ph-shirt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EDE8DF"/>
      <stop offset="100%" stop-color="#D6CFBF"/>
    </linearGradient>
    <linearGradient id="ph-screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F0FDF4"/>
      <stop offset="100%" stop-color="#DCFCE7"/>
    </linearGradient>
    <filter id="ph-shd" x="-8%" y="-6%" width="116%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#3D2B1F" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Central concept: farmer's hand extends voice/daily truth, phone receives and returns organized record -->

  <!-- LEFT SIDE — farmer's arm, from rolled-up sleeve, hand speaking into phone -->
  <g filter="url(#ph-shd)">
    <!-- Shirt sleeve (left edge, rolled) -->
    <path d="M0,135 C20,132 50,130 80,132"
          stroke="url(#ph-shirt)" stroke-width="28" fill="none" stroke-linecap="round"/>
    <!-- Roll mark -->
    <path d="M75,120 C78,118 82,120 80,125 C78,130 74,130 72,126" stroke="#B8AD9E" stroke-width="0.8" fill="url(#ph-shirt)"/>

    <!-- Forearm — sun-darkened working arm -->
    <path d="M80,132 C110,134 140,138 165,142"
          stroke="url(#ph-skin-dk)" stroke-width="22" fill="none" stroke-linecap="round"/>

    <!-- Hand — open, natural, working hand with some roughness -->
    <g transform="translate(162, 128)">
      <!-- Palm -->
      <path d="M0,10 C2,0 12,-4 22,0 C30,4 32,14 28,22 C24,28 10,28 4,24 C0,20 -2,16 0,10Z"
            fill="url(#ph-skin-dk)"/>
      <!-- Thumb -->
      <path d="M2,10 C-4,6 -6,0 -2,-2 C2,-4 6,0 6,6" stroke="#8B6545" stroke-width="4" fill="url(#ph-skin-dk)" stroke-linecap="round"/>
      <!-- Finger creases -->
      <path d="M8,4 C10,2 14,2 16,4" stroke="#8B6545" stroke-width="0.5" fill="none" opacity="0.4"/>
      <path d="M18,6 C20,4 24,4 26,6" stroke="#8B6545" stroke-width="0.5" fill="none" opacity="0.4"/>
      <!-- Callus hint -->
      <circle cx="10" cy="12" r="2" fill="#A67B5B" opacity="0.2"/>
    </g>
  </g>

  <!-- Voice waves coming from farmer side — what he gives -->
  <g transform="translate(140, 100)" opacity="0.25">
    <path d="M50,35 C55,30 55,25" stroke="#8B7D6B" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M55,38 C62,30 62,22" stroke="#8B7D6B" stroke-width="1.2" fill="none" stroke-linecap="round"/>
    <path d="M60,42 C68,32 68,20" stroke="#8B7D6B" stroke-width="0.8" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Farmer's daily truth — small text tags floating from left -->
  <g opacity="0.3">
    <g transform="translate(40, 70)">
      <rect width="55" height="18" rx="9" fill="#E8C170" opacity="0.4"/>
      <text x="8" y="12" font-family="system-ui" font-size="7" fill="#5C4A3A">फवारणी केली</text>
    </g>
    <g transform="translate(20, 170)">
      <rect width="52" height="18" rx="9" fill="#E8C170" opacity="0.4"/>
      <text x="8" y="12" font-family="system-ui" font-size="7" fill="#5C4A3A">3 मजूर आले</text>
    </g>
    <g transform="translate(50, 220)">
      <rect width="50" height="18" rx="9" fill="#E8C170" opacity="0.4"/>
      <text x="8" y="12" font-family="system-ui" font-size="7" fill="#5C4A3A">₹2,400 खर्च</text>
    </g>
  </g>

  <!-- CENTER — the phone, where exchange happens -->
  <g transform="translate(176, 98)" filter="url(#ph-shd)">
    <rect width="48" height="82" rx="8" fill="#1C1917"/>
    <rect x="3" y="10" width="42" height="62" rx="4" fill="url(#ph-screen)"/>
    <!-- Status bar -->
    <rect x="3" y="10" width="42" height="6" rx="4" fill="#059669" opacity="0.15"/>
    <text x="10" y="15" font-family="system-ui" font-size="4" fill="#059669" font-weight="600">ShramSafal</text>
    <!-- Organized entries -->
    <g transform="translate(7, 22)">
      <circle cx="3" cy="3" r="3" fill="#059669" opacity="0.15"/>
      <path d="M1.5,3 L3,4.5 L5,1.5" stroke="#059669" stroke-width="0.8" fill="none"/>
      <rect x="9" y="1" width="24" height="2" rx="1" fill="#6B7280" opacity="0.2"/>
    </g>
    <g transform="translate(7, 32)">
      <circle cx="3" cy="3" r="3" fill="#059669" opacity="0.15"/>
      <path d="M1.5,3 L3,4.5 L5,1.5" stroke="#059669" stroke-width="0.8" fill="none"/>
      <rect x="9" y="1" width="20" height="2" rx="1" fill="#6B7280" opacity="0.2"/>
    </g>
    <g transform="translate(7, 42)">
      <circle cx="3" cy="3" r="3" fill="#059669" opacity="0.15"/>
      <path d="M1.5,3 L3,4.5 L5,1.5" stroke="#059669" stroke-width="0.8" fill="none"/>
      <rect x="9" y="1" width="26" height="2" rx="1" fill="#6B7280" opacity="0.2"/>
    </g>
    <!-- Total -->
    <rect x="6" y="52" width="36" height="12" rx="2" fill="#059669" opacity="0.08"/>
    <text x="10" y="60" font-family="system-ui" font-size="5" fill="#059669" font-weight="600">₹2,400 ✓</text>
    <!-- Notch -->
    <rect x="16" y="3" width="16" height="4" rx="2" fill="#2D2D2D"/>
  </g>

  <!-- RIGHT SIDE — what comes back: organized clarity -->
  <!-- Organized record cards flowing from phone to right -->
  <g opacity="0.3">
    <g transform="translate(250, 60)">
      <rect width="70" height="20" rx="10" fill="#059669" opacity="0.15"/>
      <path d="M8,10 L10,12 L14,7" stroke="#059669" stroke-width="1" fill="none" stroke-linecap="round"/>
      <text x="18" y="13" font-family="system-ui" font-size="6.5" fill="#059669">काम नोंद</text>
    </g>
    <g transform="translate(270, 130)">
      <rect width="80" height="20" rx="10" fill="#059669" opacity="0.15"/>
      <path d="M8,10 L10,12 L14,7" stroke="#059669" stroke-width="1" fill="none" stroke-linecap="round"/>
      <text x="18" y="13" font-family="system-ui" font-size="6.5" fill="#059669">खर्च स्पष्ट</text>
    </g>
    <g transform="translate(255, 200)">
      <rect width="85" height="20" rx="10" fill="#059669" opacity="0.15"/>
      <path d="M8,10 L10,12 L14,7" stroke="#059669" stroke-width="1" fill="none" stroke-linecap="round"/>
      <text x="18" y="13" font-family="system-ui" font-size="6.5" fill="#059669">उद्याचे काम</text>
    </g>
  </g>

  <!-- Directional flow arrows — subtle -->
  <!-- Left to center: farmer gives -->
  <g opacity="0.12">
    <path d="M100,90 C130,95 150,100 170,105" stroke="#8B7D6B" stroke-width="1" fill="none" stroke-dasharray="3 2"/>
    <path d="M100,195 C130,190 150,185 170,180" stroke="#8B7D6B" stroke-width="1" fill="none" stroke-dasharray="3 2"/>
  </g>
  <!-- Center to right: app returns -->
  <g opacity="0.12">
    <path d="M230,110 C240,100 250,90 260,80" stroke="#059669" stroke-width="1" fill="none" stroke-dasharray="3 2"/>
    <path d="M230,155 C240,150 255,145 268,140" stroke="#059669" stroke-width="1" fill="none" stroke-dasharray="3 2"/>
    <path d="M230,175 C240,185 250,195 260,200" stroke="#059669" stroke-width="1" fill="none" stroke-dasharray="3 2"/>
  </g>

  <!-- Label: mutual effort -->
  <text x="100" y="280" font-family="system-ui" font-size="8" fill="#8B7D6B" opacity="0.3">शेतकरी बोलतो</text>
  <text x="278" y="280" font-family="system-ui" font-size="8" fill="#059669" opacity="0.3">ShramSafal ठेवतो</text>
</svg>