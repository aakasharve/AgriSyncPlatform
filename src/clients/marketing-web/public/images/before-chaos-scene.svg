<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <defs>
    <linearGradient id="bc-skin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C4956A"/>
      <stop offset="100%" stop-color="#A67B5B"/>
    </linearGradient>
    <linearGradient id="bc-skin-dk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A67B5B"/>
      <stop offset="100%" stop-color="#8B6545"/>
    </linearGradient>
    <linearGradient id="bc-shirt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EDE8DF"/>
      <stop offset="100%" stop-color="#D6CFBF"/>
    </linearGradient>
    <linearGradient id="bc-trouser" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8B7D6B"/>
      <stop offset="100%" stop-color="#73685A"/>
    </linearGradient>
    <filter id="bc-shd" x="-10%" y="-8%" width="120%" height="118%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#3D2B1F" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Muted warm ground -->
  <ellipse cx="200" cy="278" rx="185" ry="28" fill="#A67B5B" opacity="0.12"/>

  <!-- FARMER — slightly hunched forward, weight on one leg, hand rubbing forehead -->
  <g transform="translate(140, 30)" filter="url(#bc-shd)">

    <!-- Feet -->
    <path d="M42,242 C36,243 32,246 32,248 C32,251 38,253 46,252 C52,251 55,248 52,246Z" fill="#5C4A3A"/>
    <path d="M78,244 C72,245 68,248 68,250 C68,253 74,255 82,254 C88,253 91,250 88,248Z" fill="#5C4A3A"/>

    <!-- Legs -->
    <path d="M45,195 C44,210 42,228 43,242" stroke="url(#bc-trouser)" stroke-width="16" fill="none" stroke-linecap="round"/>
    <path d="M75,193 C76,210 77,230 78,244" stroke="url(#bc-trouser)" stroke-width="16" fill="none" stroke-linecap="round"/>

    <!-- Torso — slightly hunched forward -->
    <path d="M28,85
             C25,100 24,130 26,160
             L28,190
             C28,198 40,204 60,204
             C80,204 92,198 92,190
             L94,160
             C96,130 95,100 92,85
             C86,75 72,70 60,70
             C48,70 34,75 28,85Z" fill="url(#bc-shirt)"/>

    <!-- Shoulder hunch — posture detail -->
    <path d="M30,82 C35,78 50,74 60,73 C70,74 85,78 90,82"
          stroke="#B8AD9E" stroke-width="0.8" fill="none" opacity="0.5"/>

    <!-- Shirt wrinkles (stress tension) -->
    <path d="M40,120 C45,125 50,122" stroke="#B8AD9E" stroke-width="0.6" fill="none" opacity="0.5"/>
    <path d="M70,140 C75,142 78,139" stroke="#B8AD9E" stroke-width="0.6" fill="none" opacity="0.4"/>

    <!-- Collar -->
    <path d="M48,73 C52,78 60,80 68,78 C72,76 72,73" stroke="#B8AD9E" stroke-width="0.8" fill="none"/>

    <!-- Left arm (hanging, tense) -->
    <path d="M28,90 C18,110 15,135 18,160" stroke="url(#bc-skin)" stroke-width="11" fill="none" stroke-linecap="round"/>
    <path d="M18,160 C17,170 18,180 20,188" stroke="url(#bc-skin-dk)" stroke-width="9" fill="none" stroke-linecap="round"/>
    <!-- Left hand clenched -->
    <path d="M20,188 C18,192 19,196 22,196 C25,196 26,192 24,188Z" fill="url(#bc-skin-dk)"/>

    <!-- Right arm (hand on forehead — stress) -->
    <path d="M92,90 C100,100 105,108 106,115" stroke="url(#bc-skin)" stroke-width="11" fill="none" stroke-linecap="round"/>
    <path d="M106,115 C105,108 98,95 92,88" stroke="url(#bc-skin-dk)" stroke-width="9" fill="none" stroke-linecap="round" opacity="0"/>
    <!-- Forearm reaching to forehead -->
    <path d="M106,115 C103,108 95,98 88,90 C82,84 78,78 76,68" stroke="url(#bc-skin-dk)" stroke-width="9" fill="none" stroke-linecap="round"/>
    <!-- Hand on forehead -->
    <path d="M74,64 C72,60 70,58 72,56 C74,54 78,55 80,58 C82,60 80,64 78,66Z" fill="url(#bc-skin-dk)"/>
    <!-- Fingers on forehead -->
    <path d="M72,56 C70,54 71,52 73,53" stroke="#8B6545" stroke-width="0.6" fill="none"/>
    <path d="M76,55 C75,52 76,51 78,52" stroke="#8B6545" stroke-width="0.6" fill="none"/>

    <!-- Neck -->
    <path d="M52,68 C52,64 56,60 60,60 C64,60 68,64 68,68" fill="url(#bc-skin)"/>

    <!-- Head — slightly bowed forward -->
    <path d="M42,28
             C42,14 48,6 60,6
             C72,6 78,14 78,28
             L78,42
             C78,50 74,56 68,59
             C65,61 62,62 60,62
             C58,62 55,61 52,59
             C46,56 42,50 42,42Z"
          fill="url(#bc-skin)"/>

    <!-- Forehead darkening -->
    <path d="M44,25 C44,15 50,8 60,8 C70,8 76,15 76,25 L76,30 C76,30 70,28 60,28 C50,28 44,30 44,30Z"
          fill="#A67B5B" opacity="0.25"/>

    <!-- Hair -->
    <path d="M42,26 C42,12 48,4 60,4 C72,4 78,12 78,26 C78,22 72,18 60,18 C48,18 42,22 42,26Z"
          fill="#2C1810"/>

    <!-- Face — tired, burdened expression -->
    <!-- Eyebrows — pressed down, tense -->
    <path d="M49,32 C51,30 55,30 58,32" stroke="#2C1810" stroke-width="1.5" fill="none"/>
    <path d="M62,32 C65,30 69,30 71,32" stroke="#2C1810" stroke-width="1.5" fill="none"/>

    <!-- Eyes — slightly narrowed, tired -->
    <ellipse cx="54" cy="37" rx="3" ry="2.2" fill="white"/>
    <ellipse cx="66" cy="37" rx="3" ry="2.2" fill="white"/>
    <circle cx="54" cy="37.5" r="1.5" fill="#2C1810"/>
    <circle cx="66" cy="37.5" r="1.5" fill="#2C1810"/>
    <!-- Under-eye tiredness -->
    <path d="M51,40 C53,41 55,41 57,40" stroke="#A67B5B" stroke-width="0.5" fill="none" opacity="0.4"/>
    <path d="M63,40 C65,41 67,41 69,40" stroke="#A67B5B" stroke-width="0.5" fill="none" opacity="0.4"/>

    <!-- Nose -->
    <path d="M60,36 C61,40 62,45 60,48 C58,50 56,49 55,48" stroke="#8B6545" stroke-width="0.8" fill="none"/>

    <!-- Moustache -->
    <path d="M52,51 C55,49 58,49 60,50 C62,49 65,49 68,51" stroke="#3D2B1F" stroke-width="1.5" fill="none" stroke-linecap="round"/>

    <!-- Mouth — tight, stressed -->
    <path d="M55,56 C57,57 60,57 63,56" stroke="#8B6545" stroke-width="0.8" fill="none"/>

    <!-- Ear -->
    <path d="M42,36 C39,36 38,40 39,44 C40,46 41,46 42,44" stroke="#A67B5B" stroke-width="0.8" fill="url(#bc-skin)"/>
  </g>

  <!-- SCATTERED MENTAL LOAD FRAGMENTS — real farm items, not magic -->

  <!-- Crumpled note (expense) -->
  <g transform="translate(48, 130) rotate(-15)" filter="url(#bc-shd)">
    <path d="M0,0 L38,2 L40,48 L2,50 Z" fill="#FFFBF0" stroke="#D6CFBF" stroke-width="0.8"/>
    <text x="6" y="18" font-family="system-ui" font-size="8" fill="#8B7D6B">₹2,400</text>
    <line x1="6" y1="26" x2="32" y2="26" stroke="#D6CFBF" stroke-width="0.5"/>
    <line x1="6" y1="32" x2="28" y2="32" stroke="#D6CFBF" stroke-width="0.5"/>
    <text x="6" y="44" font-family="system-ui" font-size="7" fill="#B91C1C" opacity="0.6">??</text>
  </g>

  <!-- Worker tally paper -->
  <g transform="translate(290, 100) rotate(12)" filter="url(#bc-shd)">
    <rect width="42" height="52" rx="1" fill="#FFFBF0" stroke="#D6CFBF" stroke-width="0.8"/>
    <text x="5" y="14" font-family="system-ui" font-size="7" fill="#5C4A3A">मजूर</text>
    <!-- Tally marks -->
    <line x1="6" y1="22" x2="6" y2="32" stroke="#5C4A3A" stroke-width="1.2"/>
    <line x1="10" y1="22" x2="10" y2="32" stroke="#5C4A3A" stroke-width="1.2"/>
    <line x1="14" y1="22" x2="14" y2="32" stroke="#5C4A3A" stroke-width="1.2"/>
    <line x1="4" y1="27" x2="16" y2="27" stroke="#5C4A3A" stroke-width="1"/>
    <text x="22" y="30" font-family="system-ui" font-size="7" fill="#8B7D6B">= ?</text>
    <line x1="5" y1="38" x2="36" y2="38" stroke="#D6CFBF" stroke-width="0.5"/>
  </g>

  <!-- Missed call / phone fragment -->
  <g transform="translate(310, 200) rotate(-8)" filter="url(#bc-shd)">
    <rect width="28" height="42" rx="4" fill="#1C1917" opacity="0.8"/>
    <rect x="3" y="6" width="22" height="30" rx="2" fill="#FEE2E2"/>
    <text x="5" y="18" font-family="system-ui" font-size="6" fill="#B91C1C">3 missed</text>
    <text x="5" y="28" font-family="system-ui" font-size="6" fill="#8B7D6B">calls</text>
  </g>

  <!-- Fertilizer bag fragment -->
  <g transform="translate(55, 220) rotate(5)">
    <rect width="36" height="28" rx="2" fill="#D6CFBF" stroke="#A0926B" stroke-width="0.8"/>
    <text x="4" y="12" font-family="system-ui" font-size="6" fill="#5C4A3A">DAP</text>
    <text x="4" y="22" font-family="system-ui" font-size="5" fill="#8B7D6B">50kg — ?</text>
  </g>

  <!-- Time fragment (clock) -->
  <g transform="translate(340, 60)">
    <circle cx="14" cy="14" r="14" fill="none" stroke="#8B7D6B" stroke-width="1.2" opacity="0.4"/>
    <line x1="14" y1="14" x2="14" y2="6" stroke="#5C4A3A" stroke-width="1" opacity="0.5"/>
    <line x1="14" y1="14" x2="20" y2="14" stroke="#5C4A3A" stroke-width="0.8" opacity="0.5"/>
    <circle cx="14" cy="14" r="1" fill="#5C4A3A" opacity="0.5"/>
  </g>

  <!-- Subtle stress indicators — not dramatic, just mental weight -->
  <g opacity="0.12">
    <text x="100" y="60" font-family="Georgia, serif" font-size="14" fill="#8B6545">कधी?</text>
    <text x="270" y="265" font-family="Georgia, serif" font-size="12" fill="#8B6545">किती?</text>
  </g>
</svg>