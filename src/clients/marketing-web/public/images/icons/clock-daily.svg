<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="clockCircleGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#047857" />
    </linearGradient>
    <linearGradient id="clockFaceGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff" />
      <stop offset="100%" stop-color="#f0fdf4" />
    </linearGradient>
    <filter id="clockShadow">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="#047857" flood-opacity="0.25" />
    </filter>
  </defs>

  <!-- Circle background -->
  <circle cx="32" cy="32" r="30" fill="url(#clockCircleGrad)" filter="url(#clockShadow)" />

  <!-- Inner highlight -->
  <circle cx="32" cy="32" r="28" fill="none" stroke="#34d399" stroke-width="0.5" opacity="0.4" />

  <!-- Clock face -->
  <circle cx="30" cy="32" r="18" fill="url(#clockFaceGrad)" />
  <circle cx="30" cy="32" r="17" fill="none" stroke="#d1fae5" stroke-width="0.5" />

  <!-- Hour markers -->
  <g stroke="#059669" stroke-width="1.5" opacity="0.4" stroke-linecap="round">
    <!-- 12 o'clock -->
    <line x1="30" y1="16" x2="30" y2="19" />
    <!-- 3 o'clock -->
    <line x1="46" y1="32" x2="43" y2="32" />
    <!-- 6 o'clock -->
    <line x1="30" y1="48" x2="30" y2="45" />
    <!-- 9 o'clock -->
    <line x1="14" y1="32" x2="17" y2="32" />
  </g>

  <!-- Minor tick marks -->
  <g stroke="#059669" stroke-width="0.8" opacity="0.2" stroke-linecap="round">
    <!-- 1 -->
    <line x1="37.5" y1="17.5" x2="36" y2="19.5" />
    <!-- 2 -->
    <line x1="43" y1="24.5" x2="41" y2="25.5" />
    <!-- 4 -->
    <line x1="43" y1="39.5" x2="41" y2="38.5" />
    <!-- 5 -->
    <line x1="37.5" y1="46.5" x2="36" y2="44.5" />
    <!-- 7 -->
    <line x1="22.5" y1="46.5" x2="24" y2="44.5" />
    <!-- 8 -->
    <line x1="17" y1="39.5" x2="19" y2="38.5" />
    <!-- 10 -->
    <line x1="17" y1="24.5" x2="19" y2="25.5" />
    <!-- 11 -->
    <line x1="22.5" y1="17.5" x2="24" y2="19.5" />
  </g>

  <!-- Clock hands - showing 1 o'clock (for "1 minute") -->
  <!-- Hour hand -->
  <line x1="30" y1="32" x2="33" y2="21" stroke="#059669" stroke-width="2.5" stroke-linecap="round" />
  <!-- Minute hand -->
  <line x1="30" y1="32" x2="30" y2="18" stroke="#059669" stroke-width="1.5" stroke-linecap="round" />

  <!-- Center dot -->
  <circle cx="30" cy="32" r="2" fill="#059669" />
  <circle cx="30" cy="32" r="1" fill="#fff" />

  <!-- Badge with "1" (overlapping bottom-right) -->
  <circle cx="44" cy="44" r="10" fill="#059669" stroke="#047857" stroke-width="1" />

  <!-- Number "1" in badge -->
  <text x="44" y="48.5" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#fff">1</text>

  <!-- Minute label below the "1" -->
  <text x="44" y="56" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="4.5" font-weight="500" fill="#34d399" opacity="0.8">MIN</text>
</svg>