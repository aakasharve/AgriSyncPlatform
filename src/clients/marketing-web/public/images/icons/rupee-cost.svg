<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="rupeeCircleGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#047857" />
    </linearGradient>
    <filter id="rupeeShadow">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="#047857" flood-opacity="0.25" />
    </filter>
  </defs>

  <!-- Circle background -->
  <circle cx="32" cy="32" r="30" fill="url(#rupeeCircleGrad)" filter="url(#rupeeShadow)" />

  <!-- Inner highlight -->
  <circle cx="32" cy="32" r="28" fill="none" stroke="#34d399" stroke-width="0.5" opacity="0.4" />

  <!-- Inner coin circle -->
  <circle cx="32" cy="32" r="20" fill="none" stroke="#fff" stroke-width="1" opacity="0.25" />
  <circle cx="32" cy="32" r="18" fill="none" stroke="#fff" stroke-width="0.5" opacity="0.15" />

  <!-- Rupee symbol (INR) - stylized -->
  <g fill="none" stroke="#fff" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round">
    <!-- Top horizontal line -->
    <line x1="25" y1="20" x2="39" y2="20" />

    <!-- Second horizontal line -->
    <line x1="25" y1="26" x2="39" y2="26" />

    <!-- Vertical stem going down from left -->
    <path d="M27,20 L27,26 Q27,36 35,36 L35,36" />

    <!-- Diagonal slash down to bottom -->
    <path d="M27,26 L37,44" />
  </g>

  <!-- Subtle coin edge detail -->
  <g stroke="#34d399" stroke-width="0.5" opacity="0.3" fill="none">
    <circle cx="32" cy="32" r="24" stroke-dasharray="2,3" />
  </g>

  <!-- Small shine spots -->
  <circle cx="22" cy="22" r="1.5" fill="#fff" opacity="0.2" />
  <circle cx="20" cy="26" r="1" fill="#fff" opacity="0.15" />
</svg>