<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="shieldCircleGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#047857" />
    </linearGradient>
    <linearGradient id="shieldBodyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff" />
      <stop offset="100%" stop-color="#d1fae5" />
    </linearGradient>
    <filter id="shieldShadow">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="#047857" flood-opacity="0.25" />
    </filter>
  </defs>

  <!-- Circle background -->
  <circle cx="32" cy="32" r="30" fill="url(#shieldCircleGrad)" filter="url(#shieldShadow)" />

  <!-- Inner highlight -->
  <circle cx="32" cy="32" r="28" fill="none" stroke="#34d399" stroke-width="0.5" opacity="0.4" />

  <!-- Shield shape -->
  <path d="M32,11 L47,18 Q48,19 48,20 L48,30 Q48,42 32,53 Q16,42 16,30 L16,20 Q16,19 17,18 Z" fill="url(#shieldBodyGrad)" />

  <!-- Shield outline for definition -->
  <path d="M32,11 L47,18 Q48,19 48,20 L48,30 Q48,42 32,53 Q16,42 16,30 L16,20 Q16,19 17,18 Z" fill="none" stroke="#a7f3d0" stroke-width="0.8" />

  <!-- Inner shield highlight -->
  <path d="M32,15 L44,21 L44,30 Q44,40 32,49 Q20,40 20,30 L20,21 Z" fill="none" stroke="#059669" stroke-width="1" opacity="0.2" />

  <!-- Shield center divider -->
  <line x1="32" y1="15" x2="32" y2="49" stroke="#059669" stroke-width="0.5" opacity="0.1" />

  <!-- Checkmark -->
  <path d="M24,32 L29.5,37.5 L40,27" fill="none" stroke="#059669" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" />

  <!-- Subtle shine on shield -->
  <path d="M32,13 L44,19 L44,28 Q38,18 32,15 Z" fill="#fff" opacity="0.15" />
</svg>