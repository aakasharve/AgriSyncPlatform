<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="chartCircleGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#047857" />
    </linearGradient>
    <linearGradient id="barGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#ecfdf5" />
    </linearGradient>
    <filter id="chartShadow">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="#047857" flood-opacity="0.25" />
    </filter>
  </defs>

  <!-- Circle background -->
  <circle cx="32" cy="32" r="30" fill="url(#chartCircleGrad)" filter="url(#chartShadow)" />

  <!-- Inner highlight -->
  <circle cx="32" cy="32" r="28" fill="none" stroke="#34d399" stroke-width="0.5" opacity="0.4" />

  <!-- Chart axis lines -->
  <path d="M16,48 L16,16 M16,48 L50,48" fill="none" stroke="#fff" stroke-width="1.5" opacity="0.4" stroke-linecap="round" />

  <!-- Grid lines (subtle) -->
  <g stroke="#fff" stroke-width="0.5" opacity="0.15">
    <line x1="16" y1="40" x2="50" y2="40" />
    <line x1="16" y1="32" x2="50" y2="32" />
    <line x1="16" y1="24" x2="50" y2="24" />
  </g>

  <!-- Rising bar chart -->
  <rect x="19" y="40" width="5" height="8" rx="1" fill="url(#barGrad)" opacity="0.7" />
  <rect x="26" y="34" width="5" height="14" rx="1" fill="url(#barGrad)" opacity="0.8" />
  <rect x="33" y="28" width="5" height="20" rx="1" fill="url(#barGrad)" opacity="0.9" />
  <rect x="40" y="20" width="5" height="28" rx="1" fill="#fff" />

  <!-- Upward trend line -->
  <path d="M21.5,38 L28.5,32 L35.5,26 L42.5,18" fill="none" stroke="#FCD34D" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />

  <!-- Trend dots -->
  <circle cx="21.5" cy="38" r="2" fill="#FCD34D" />
  <circle cx="28.5" cy="32" r="2" fill="#FCD34D" />
  <circle cx="35.5" cy="26" r="2" fill="#FCD34D" />
  <circle cx="42.5" cy="18" r="2.5" fill="#FCD34D" />

  <!-- Sparkle at top -->
  <g stroke="#FCD34D" stroke-width="1" stroke-linecap="round" opacity="0.8">
    <line x1="42.5" y1="13" x2="42.5" y2="15" />
    <line x1="45.5" y1="16" x2="44" y2="17" />
    <line x1="39.5" y1="16" x2="41" y2="17" />
  </g>
</svg>