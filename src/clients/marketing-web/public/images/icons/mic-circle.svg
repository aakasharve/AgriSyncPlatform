<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="micCircleGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#047857" />
    </linearGradient>
    <linearGradient id="micBodyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff" />
      <stop offset="100%" stop-color="#ecfdf5" />
    </linearGradient>
    <!-- Subtle shadow -->
    <filter id="micShadow">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="#047857" flood-opacity="0.25" />
    </filter>
  </defs>

  <!-- Circle background -->
  <circle cx="32" cy="32" r="30" fill="url(#micCircleGrad)" filter="url(#micShadow)" />

  <!-- Inner highlight ring -->
  <circle cx="32" cy="32" r="28" fill="none" stroke="#34d399" stroke-width="0.5" opacity="0.4" />

  <!-- Microphone body -->
  <rect x="27" y="16" width="10" height="18" rx="5" fill="url(#micBodyGrad)" />

  <!-- Microphone grille lines -->
  <g stroke="#d1fae5" stroke-width="0.6" opacity="0.5">
    <line x1="29" y1="19" x2="35" y2="19" />
    <line x1="29" y1="21.5" x2="35" y2="21.5" />
    <line x1="29" y1="24" x2="35" y2="24" />
    <line x1="29" y1="26.5" x2="35" y2="26.5" />
  </g>

  <!-- Microphone arc/holder -->
  <path d="M23,30 Q23,42 32,42 Q41,42 41,30" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" />

  <!-- Stand -->
  <line x1="32" y1="42" x2="32" y2="48" stroke="#fff" stroke-width="2.5" stroke-linecap="round" />

  <!-- Base -->
  <line x1="26" y1="48" x2="38" y2="48" stroke="#fff" stroke-width="2.5" stroke-linecap="round" />

  <!-- Sound wave arcs -->
  <g stroke="#34d399" stroke-width="1" fill="none" opacity="0.6" stroke-linecap="round">
    <path d="M18,26 Q16,32 18,38" />
    <path d="M46,26 Q48,32 46,38" />
  </g>
  <g stroke="#6ee7b7" stroke-width="0.8" fill="none" opacity="0.35" stroke-linecap="round">
    <path d="M14,24 Q11,32 14,40" />
    <path d="M50,24 Q53,32 50,40" />
  </g>
</svg>