<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <defs>
    <linearGradient id="ac-skin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C4956A"/>
      <stop offset="100%" stop-color="#A67B5B"/>
    </linearGradient>
    <linearGradient id="ac-skin-dk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A67B5B"/>
      <stop offset="100%" stop-color="#8B6545"/>
    </linearGradient>
    <linearGradient id="ac-shirt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EDE8DF"/>
      <stop offset="100%" stop-color="#D6CFBF"/>
    </linearGradient>
    <linearGradient id="ac-trouser" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8B7D6B"/>
      <stop offset="100%" stop-color="#73685A"/>
    </linearGradient>
    <linearGradient id="ac-screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F0FDF4"/>
      <stop offset="100%" stop-color="#DCFCE7"/>
    </linearGradient>
    <filter id="ac-shd" x="-10%" y="-8%" width="120%" height="118%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#3D2B1F" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Clean warm ground -->
  <ellipse cx="200" cy="278" rx="185" ry="28" fill="#059669" opacity="0.06"/>

  <!-- FARMER — upright, composed, phone in hand showing organized data -->
  <g transform="translate(130, 20)" filter="url(#ac-shd)">

    <!-- Feet -->
    <path d="M48,248 C42,249 38,252 38,254 C38,257 44,259 52,258 C58,257 61,254 58,252Z" fill="#5C4A3A"/>
    <path d="M82,250 C76,251 72,254 72,256 C72,259 78,261 86,260 C92,259 95,256 92,254Z" fill="#5C4A3A"/>

    <!-- Legs — standing straight, confident -->
    <path d="M50,200 C49,215 48,235 48,248" stroke="url(#ac-trouser)" stroke-width="16" fill="none" stroke-linecap="round"/>
    <path d="M80,198 C81,215 82,235 82,250" stroke="url(#ac-trouser)" stroke-width="16" fill="none" stroke-linecap="round"/>

    <!-- Torso — upright, shoulders back -->
    <path d="M30,82
             C27,98 26,130 28,160
             L30,195
             C30,203 45,208 65,208
             C85,208 100,203 100,195
             L102,160
             C104,130 103,98 100,82
             C94,72 80,66 65,66
             C50,66 36,72 30,82Z" fill="url(#ac-shirt)"/>

    <!-- Shirt wrinkles — relaxed -->
    <path d="M42,120 C46,123 50,121" stroke="#B8AD9E" stroke-width="0.5" fill="none" opacity="0.4"/>
    <path d="M78,135 C82,137 86,134" stroke="#B8AD9E" stroke-width="0.5" fill="none" opacity="0.4"/>

    <!-- Collar -->
    <path d="M50,70 C55,75 65,77 75,75 C78,73" stroke="#B8AD9E" stroke-width="0.8" fill="none"/>
    <path d="M53,70 L57,80" stroke="#B8AD9E" stroke-width="0.6" fill="none"/>
    <path d="M77,70 L73,80" stroke="#B8AD9E" stroke-width="0.6" fill="none"/>

    <!-- Neck base skin -->
    <path d="M53,70 C57,73 73,73 77,70" fill="url(#ac-skin-dk)"/>

    <!-- Left arm relaxed at side -->
    <path d="M30,88 C20,108 17,135 20,165" stroke="url(#ac-skin)" stroke-width="11" fill="none" stroke-linecap="round"/>
    <path d="M20,165 C19,175 20,185 22,192" stroke="url(#ac-skin-dk)" stroke-width="9" fill="none" stroke-linecap="round"/>
    <path d="M22,192 C20,196 21,200 24,200 C27,199 28,196 26,192Z" fill="url(#ac-skin-dk)"/>

    <!-- Right arm holding phone at waist/chest level -->
    <path d="M100,88 C108,102 112,118 110,130" stroke="url(#ac-skin)" stroke-width="11" fill="none" stroke-linecap="round"/>
    <path d="M110,130 C108,138 104,145 100,150" stroke="url(#ac-skin-dk)" stroke-width="9" fill="none" stroke-linecap="round"/>

    <!-- Phone -->
    <g transform="translate(88, 142) rotate(-5)">
      <rect width="30" height="50" rx="4" fill="#1C1917"/>
      <rect x="2" y="6" width="26" height="38" rx="2" fill="url(#ac-screen)"/>
      <rect x="2" y="6" width="26" height="3.5" rx="2" fill="#059669" opacity="0.2"/>
      <g transform="translate(5, 14)">
        <circle cx="2" cy="2" r="2" fill="#059669" opacity="0.25"/>
        <path d="M1,2 L2,3 L3.5,1" stroke="#059669" stroke-width="0.8" fill="none"/>
        <rect x="7" y="0.5" width="12" height="1.5" rx="0.75" fill="#6B7280" opacity="0.25"/>
      </g>
      <g transform="translate(5, 21)">
        <circle cx="2" cy="2" r="2" fill="#059669" opacity="0.25"/>
        <path d="M1,2 L2,3 L3.5,1" stroke="#059669" stroke-width="0.8" fill="none"/>
        <rect x="7" y="0.5" width="14" height="1.5" rx="0.75" fill="#6B7280" opacity="0.25"/>
      </g>
      <g transform="translate(5, 28)">
        <circle cx="2" cy="2" r="2" fill="#059669" opacity="0.25"/>
        <path d="M1,2 L2,3 L3.5,1" stroke="#059669" stroke-width="0.8" fill="none"/>
        <rect x="7" y="0.5" width="10" height="1.5" rx="0.75" fill="#6B7280" opacity="0.25"/>
      </g>
      <rect x="4" y="34" width="22" height="6" rx="1" fill="#059669" opacity="0.1"/>
      <text x="6" y="39" font-family="system-ui" font-size="4" fill="#059669" font-weight="600">₹2,400</text>
      <rect x="10" y="1.5" width="10" height="2.5" rx="1.25" fill="#2D2D2D"/>
    </g>

    <!-- Right hand on phone -->
    <path d="M98,148 C96,152 95,156 97,160 C99,162 103,160 104,156 C105,152 104,148 102,146Z"
          fill="url(#ac-skin-dk)"/>

    <!-- Neck -->
    <path d="M55,65 C55,60 58,56 65,56 C72,56 75,60 75,65" fill="url(#ac-skin)"/>

    <!-- Head — upright, alert -->
    <path d="M44,24 C44,10 52,2 65,2 C78,2 86,10 86,24 L86,38 C86,46 82,52 76,55 C73,57 70,58 65,58 C60,58 57,57 54,55 C48,52 44,46 44,38Z"
          fill="url(#ac-skin)"/>

    <!-- Forehead darkening -->
    <path d="M46,22 C46,12 54,4 65,4 C76,4 84,12 84,22 L84,26 C84,26 76,24 65,24 C54,24 46,26 46,26Z"
          fill="#A67B5B" opacity="0.2"/>

    <!-- Hair -->
    <path d="M44,22 C44,8 52,0 65,0 C78,0 86,8 86,22 C86,18 78,14 65,14 C52,14 44,18 44,22Z"
          fill="#2C1810"/>

    <!-- Face — alert, quietly confident -->
    <path d="M51,29 C53,27 57,27 60,28" stroke="#2C1810" stroke-width="1.4" fill="none"/>
    <path d="M70,28 C73,27 77,27 79,29" stroke="#2C1810" stroke-width="1.4" fill="none"/>

    <ellipse cx="56" cy="34" rx="3.2" ry="2.8" fill="white"/>
    <ellipse cx="74" cy="34" rx="3.2" ry="2.8" fill="white"/>
    <circle cx="56" cy="34" r="1.8" fill="#2C1810"/>
    <circle cx="74" cy="34" r="1.8" fill="#2C1810"/>
    <circle cx="56.5" cy="33.5" r="0.5" fill="white"/>
    <circle cx="74.5" cy="33.5" r="0.5" fill="white"/>

    <path d="M65,32 C66,36 67,40 65,44 C63,45 61,44 60,43" stroke="#8B6545" stroke-width="0.8" fill="none"/>

    <path d="M57,47 C60,45 63,45 65,46 C67,45 70,45 73,47" stroke="#3D2B1F" stroke-width="1.5" fill="none" stroke-linecap="round"/>

    <path d="M60,52 C62,53 65,53 68,52" stroke="#8B6545" stroke-width="0.8" fill="none"/>

    <path d="M46,38 C46,46 50,54 56,57" stroke="#A67B5B" stroke-width="0.5" fill="none" opacity="0.3"/>
    <path d="M84,38 C84,46 80,54 74,57" stroke="#A67B5B" stroke-width="0.5" fill="none" opacity="0.3"/>

    <path d="M44,32 C41,32 40,36 41,40 C42,42 43,42 44,40" stroke="#A67B5B" stroke-width="0.7" fill="url(#ac-skin)"/>
  </g>

  <!-- ORGANIZED RECORD CARD floating nearby -->
  <g transform="translate(290, 100) rotate(3)" filter="url(#ac-shd)">
    <rect width="70" height="90" rx="6" fill="white" stroke="#059669" stroke-width="0.8" opacity="0.9"/>
    <rect x="0" y="0" width="70" height="16" rx="6" fill="#059669" opacity="0.08"/>
    <text x="8" y="11" font-family="system-ui" font-size="6.5" fill="#059669" font-weight="600">आजचा हिशोब</text>
    <g transform="translate(8, 24)">
      <path d="M0,0 L2,2 L5,-2" stroke="#059669" stroke-width="1" fill="none" stroke-linecap="round"/>
      <text x="9" y="1" font-family="system-ui" font-size="5.5" fill="#5C4A3A">फवारणी — प्लॉट A</text>
    </g>
    <g transform="translate(8, 36)">
      <path d="M0,0 L2,2 L5,-2" stroke="#059669" stroke-width="1" fill="none" stroke-linecap="round"/>
      <text x="9" y="1" font-family="system-ui" font-size="5.5" fill="#5C4A3A">3 मजूर × ₹800</text>
    </g>
    <g transform="translate(8, 48)">
      <path d="M0,0 L2,2 L5,-2" stroke="#059669" stroke-width="1" fill="none" stroke-linecap="round"/>
      <text x="9" y="1" font-family="system-ui" font-size="5.5" fill="#5C4A3A">ठिबक सिंचन</text>
    </g>
    <line x1="8" y1="60" x2="62" y2="60" stroke="#D6CFBF" stroke-width="0.5"/>
    <text x="8" y="72" font-family="system-ui" font-size="7" fill="#059669" font-weight="700">एकूण: ₹2,400</text>
    <rect x="8" y="78" width="36" height="7" rx="3.5" fill="#059669" opacity="0.1"/>
    <text x="12" y="84" font-family="system-ui" font-size="4.5" fill="#059669" font-weight="600">✓ पूर्ण</text>
  </g>

  <!-- Subtle clarity indicators -->
  <g opacity="0.1">
    <circle cx="320" cy="70" r="3" fill="#059669"/>
    <circle cx="350" cy="210" r="2" fill="#059669"/>
    <circle cx="60" cy="50" r="2" fill="#059669"/>
  </g>
</svg>