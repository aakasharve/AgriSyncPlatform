<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 600" width="1920" height="600">
  <defs>
    <!-- Bright clear sky -->
    <linearGradient id="clearSkyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0369a1" />
      <stop offset="25%" stop-color="#0ea5e9" />
      <stop offset="50%" stop-color="#7DD3FC" />
      <stop offset="75%" stop-color="#bae6fd" />
      <stop offset="100%" stop-color="#e0f2fe" />
    </linearGradient>

    <!-- Vibrant field greens -->
    <linearGradient id="clearField1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#059669" />
      <stop offset="100%" stop-color="#047857" />
    </linearGradient>
    <linearGradient id="clearField2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#34d399" />
      <stop offset="100%" stop-color="#10b981" />
    </linearGradient>
    <linearGradient id="clearField3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2d8a4e" />
      <stop offset="100%" stop-color="#1a5c2c" />
    </linearGradient>
    <linearGradient id="clearField4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FCD34D" />
      <stop offset="100%" stop-color="#F59E0B" />
    </linearGradient>

    <!-- Sun highlight -->
    <radialGradient id="clearSunHighlight" cx="70%" cy="10%" r="40%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#fff" stop-opacity="0" />
    </radialGradient>

    <!-- Crisp detail enhancement -->
    <filter id="sharpen" x="0" y="0" width="100%" height="100%">
      <feConvolveMatrix kernelMatrix="0 -0.5 0  -0.5 3 -0.5  0 -0.5 0" />
    </filter>

    <!-- Subtle shadow for depth -->
    <filter id="fieldShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="1" flood-color="#000" flood-opacity="0.1" />
    </filter>

    <!-- Clean geometric grid pattern -->
    <pattern id="fieldGrid" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
      <rect width="60" height="60" fill="none" />
      <line x1="0" y1="30" x2="60" y2="30" stroke="#047857" stroke-width="0.3" stroke-opacity="0.2" />
      <line x1="30" y1="0" x2="30" y2="60" stroke="#047857" stroke-width="0.3" stroke-opacity="0.1" />
    </pattern>

    <!-- Clean bright overlay -->
    <linearGradient id="brightOverlay" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.05" />
      <stop offset="100%" stop-color="#fff" stop-opacity="0" />
    </linearGradient>

    <!-- Bottom subtle gradient -->
    <linearGradient id="clearBottom" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="transparent" />
      <stop offset="100%" stop-color="#059669" stop-opacity="0.15" />
    </linearGradient>
  </defs>

  <!-- Bright clear sky -->
  <rect width="1920" height="600" fill="url(#clearSkyGrad)" />

  <!-- Sun highlight -->
  <rect width="1920" height="600" fill="url(#clearSunHighlight)" />

  <!-- Clean, defined distant hills -->
  <path d="M0,220 Q240,180 480,210 Q720,170 960,200 Q1200,165 1440,195 Q1680,175 1920,205 L1920,280 L0,280 Z" fill="#059669" opacity="0.25" />
  <path d="M0,245 Q300,215 600,240 Q900,210 1200,235 Q1500,215 1920,240 L1920,300 L0,300 Z" fill="#2d8a4e" opacity="0.3" />

  <!-- Clean tree line - evenly spaced, organized -->
  <g fill="#1a5c2c" opacity="0.7">
    <ellipse cx="100" cy="260" rx="18" ry="28" />
    <ellipse cx="200" cy="255" rx="20" ry="30" />
    <ellipse cx="300" cy="258" rx="18" ry="28" />
    <ellipse cx="400" cy="254" rx="20" ry="30" />
    <ellipse cx="500" cy="257" rx="18" ry="28" />
    <ellipse cx="600" cy="253" rx="20" ry="30" />
    <ellipse cx="700" cy="256" rx="18" ry="28" />
    <ellipse cx="800" cy="252" rx="20" ry="30" />
    <ellipse cx="900" cy="255" rx="18" ry="28" />
    <ellipse cx="1000" cy="251" rx="20" ry="30" />
    <ellipse cx="1100" cy="254" rx="18" ry="28" />
    <ellipse cx="1200" cy="250" rx="20" ry="30" />
    <ellipse cx="1300" cy="253" rx="18" ry="28" />
    <ellipse cx="1400" cy="249" rx="20" ry="30" />
    <ellipse cx="1500" cy="252" rx="18" ry="28" />
    <ellipse cx="1600" cy="248" rx="20" ry="30" />
    <ellipse cx="1700" cy="251" rx="18" ry="28" />
    <ellipse cx="1800" cy="247" rx="20" ry="30" />
    <ellipse cx="1900" cy="250" rx="18" ry="28" />
  </g>
  <!-- Tree trunks -->
  <g fill="#78350F" opacity="0.4">
    <rect x="98" y="280" width="4" height="10" />
    <rect x="198" y="278" width="4" height="10" />
    <rect x="298" y="279" width="4" height="10" />
    <rect x="398" y="277" width="4" height="10" />
    <rect x="498" y="278" width="4" height="10" />
    <rect x="598" y="276" width="4" height="10" />
    <rect x="698" y="277" width="4" height="10" />
    <rect x="798" y="275" width="4" height="10" />
    <rect x="898" y="276" width="4" height="10" />
    <rect x="998" y="274" width="4" height="10" />
    <rect x="1098" y="275" width="4" height="10" />
    <rect x="1198" y="273" width="4" height="10" />
    <rect x="1298" y="274" width="4" height="10" />
    <rect x="1398" y="272" width="4" height="10" />
    <rect x="1498" y="273" width="4" height="10" />
    <rect x="1598" y="271" width="4" height="10" />
    <rect x="1698" y="272" width="4" height="10" />
    <rect x="1798" y="270" width="4" height="10" />
    <rect x="1898" y="271" width="4" height="10" />
  </g>

  <!-- Organized fields - geometric precision -->
  <!-- Field 1 - Bright green (left) -->
  <path d="M0,290 L480,280 L480,600 L0,600 Z" fill="url(#clearField1)" />
  <!-- Precise crop rows -->
  <g stroke="#047857" stroke-width="1" opacity="0.3">
    <line x1="0" y1="310" x2="480" y2="300" />
    <line x1="0" y1="335" x2="480" y2="325" />
    <line x1="0" y1="360" x2="480" y2="350" />
    <line x1="0" y1="385" x2="480" y2="375" />
    <line x1="0" y1="410" x2="480" y2="400" />
    <line x1="0" y1="435" x2="480" y2="425" />
    <line x1="0" y1="460" x2="480" y2="450" />
    <line x1="0" y1="485" x2="480" y2="475" />
    <line x1="0" y1="510" x2="480" y2="500" />
    <line x1="0" y1="535" x2="480" y2="525" />
    <line x1="0" y1="560" x2="480" y2="550" />
    <line x1="0" y1="585" x2="480" y2="575" />
  </g>
  <!-- Crop dots - perfectly aligned -->
  <g fill="#10b981" opacity="0.2">
    <circle cx="60" cy="320" r="3" /><circle cx="120" cy="317" r="3" /><circle cx="180" cy="314" r="3" /><circle cx="240" cy="311" r="3" /><circle cx="300" cy="308" r="3" /><circle cx="360" cy="305" r="3" /><circle cx="420" cy="302" r="3" />
    <circle cx="60" cy="370" r="3" /><circle cx="120" cy="367" r="3" /><circle cx="180" cy="364" r="3" /><circle cx="240" cy="361" r="3" /><circle cx="300" cy="358" r="3" /><circle cx="360" cy="355" r="3" /><circle cx="420" cy="352" r="3" />
    <circle cx="60" cy="420" r="3" /><circle cx="120" cy="417" r="3" /><circle cx="180" cy="414" r="3" /><circle cx="240" cy="411" r="3" /><circle cx="300" cy="408" r="3" /><circle cx="360" cy="405" r="3" /><circle cx="420" cy="402" r="3" />
    <circle cx="60" cy="470" r="3" /><circle cx="120" cy="467" r="3" /><circle cx="180" cy="464" r="3" /><circle cx="240" cy="461" r="3" /><circle cx="300" cy="458" r="3" /><circle cx="360" cy="455" r="3" /><circle cx="420" cy="452" r="3" />
    <circle cx="60" cy="520" r="3" /><circle cx="120" cy="517" r="3" /><circle cx="180" cy="514" r="3" /><circle cx="240" cy="511" r="3" /><circle cx="300" cy="508" r="3" /><circle cx="360" cy="505" r="3" /><circle cx="420" cy="502" r="3" />
  </g>

  <!-- Field 2 - Light green (center-left) -->
  <path d="M480,280 L960,270 L960,600 L480,600 Z" fill="url(#clearField2)" />
  <g stroke="#059669" stroke-width="1" opacity="0.25">
    <line x1="480" y1="300" x2="960" y2="290" />
    <line x1="480" y1="325" x2="960" y2="315" />
    <line x1="480" y1="350" x2="960" y2="340" />
    <line x1="480" y1="375" x2="960" y2="365" />
    <line x1="480" y1="400" x2="960" y2="390" />
    <line x1="480" y1="425" x2="960" y2="415" />
    <line x1="480" y1="450" x2="960" y2="440" />
    <line x1="480" y1="475" x2="960" y2="465" />
    <line x1="480" y1="500" x2="960" y2="490" />
    <line x1="480" y1="525" x2="960" y2="515" />
    <line x1="480" y1="550" x2="960" y2="540" />
    <line x1="480" y1="575" x2="960" y2="565" />
  </g>

  <!-- Field 3 - Deep green (center-right) -->
  <path d="M960,270 L1440,275 L1440,600 L960,600 Z" fill="url(#clearField3)" />
  <g stroke="#14532d" stroke-width="1" opacity="0.3">
    <line x1="960" y1="290" x2="1440" y2="295" />
    <line x1="960" y1="315" x2="1440" y2="320" />
    <line x1="960" y1="340" x2="1440" y2="345" />
    <line x1="960" y1="365" x2="1440" y2="370" />
    <line x1="960" y1="390" x2="1440" y2="395" />
    <line x1="960" y1="415" x2="1440" y2="420" />
    <line x1="960" y1="440" x2="1440" y2="445" />
    <line x1="960" y1="465" x2="1440" y2="470" />
    <line x1="960" y1="490" x2="1440" y2="495" />
    <line x1="960" y1="515" x2="1440" y2="520" />
    <line x1="960" y1="540" x2="1440" y2="545" />
    <line x1="960" y1="565" x2="1440" y2="570" />
  </g>

  <!-- Field 4 - Golden wheat (right) -->
  <path d="M1440,275 L1920,285 L1920,600 L1440,600 Z" fill="url(#clearField4)" />
  <g stroke="#d97706" stroke-width="1" opacity="0.3">
    <line x1="1440" y1="295" x2="1920" y2="305" />
    <line x1="1440" y1="320" x2="1920" y2="330" />
    <line x1="1440" y1="345" x2="1920" y2="355" />
    <line x1="1440" y1="370" x2="1920" y2="380" />
    <line x1="1440" y1="395" x2="1920" y2="405" />
    <line x1="1440" y1="420" x2="1920" y2="430" />
    <line x1="1440" y1="445" x2="1920" y2="455" />
    <line x1="1440" y1="470" x2="1920" y2="480" />
    <line x1="1440" y1="495" x2="1920" y2="505" />
    <line x1="1440" y1="520" x2="1920" y2="530" />
    <line x1="1440" y1="545" x2="1920" y2="555" />
    <line x1="1440" y1="570" x2="1920" y2="580" />
  </g>

  <!-- Clean irrigation lines - precise and orderly -->
  <g stroke="#7DD3FC" stroke-width="2" opacity="0.3" fill="none">
    <line x1="480" y1="280" x2="480" y2="600" />
    <line x1="960" y1="270" x2="960" y2="600" />
    <line x1="1440" y1="275" x2="1440" y2="600" />
  </g>
  <g stroke="#7DD3FC" stroke-width="1" opacity="0.2" fill="none">
    <line x1="0" y1="400" x2="1920" y2="395" />
    <line x1="0" y1="500" x2="1920" y2="495" />
  </g>

  <!-- Clean straight dirt path -->
  <path d="M940,600 L955,270" stroke="#b45309" stroke-width="6" opacity="0.15" fill="none" />
  <path d="M940,600 L955,270" stroke="#d97706" stroke-width="3" opacity="0.1" fill="none" />

  <!-- Sunlight rays from top-right -->
  <g opacity="0.06">
    <line x1="1920" y1="0" x2="960" y2="600" stroke="#FCD34D" stroke-width="80" />
    <line x1="1920" y1="0" x2="1200" y2="600" stroke="#FCD34D" stroke-width="60" />
    <line x1="1920" y1="0" x2="1440" y2="600" stroke="#FCD34D" stroke-width="40" />
  </g>

  <!-- Light overlay for brightness -->
  <rect width="1920" height="600" fill="url(#brightOverlay)" />

  <!-- Subtle bottom tint -->
  <rect width="1920" height="600" fill="url(#clearBottom)" />
</svg>