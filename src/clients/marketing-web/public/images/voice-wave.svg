<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 100" width="800" height="100">
  <defs>
    <!-- Main wave gradient -->
    <linearGradient id="waveGrad1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#059669" stop-opacity="0.2" />
      <stop offset="15%" stop-color="#059669" stop-opacity="0.7" />
      <stop offset="50%" stop-color="#10b981" stop-opacity="1" />
      <stop offset="85%" stop-color="#059669" stop-opacity="0.7" />
      <stop offset="100%" stop-color="#059669" stop-opacity="0.2" />
    </linearGradient>

    <!-- Secondary wave gradient -->
    <linearGradient id="waveGrad2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.1" />
      <stop offset="20%" stop-color="#34d399" stop-opacity="0.4" />
      <stop offset="50%" stop-color="#6ee7b7" stop-opacity="0.6" />
      <stop offset="80%" stop-color="#34d399" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#34d399" stop-opacity="0.1" />
    </linearGradient>

    <!-- Tertiary deeper wave -->
    <linearGradient id="waveGrad3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#047857" stop-opacity="0.1" />
      <stop offset="25%" stop-color="#047857" stop-opacity="0.5" />
      <stop offset="50%" stop-color="#059669" stop-opacity="0.8" />
      <stop offset="75%" stop-color="#047857" stop-opacity="0.5" />
      <stop offset="100%" stop-color="#047857" stop-opacity="0.1" />
    </linearGradient>

    <!-- Glow filter -->
    <filter id="waveGlow">
      <feGaussianBlur stdDeviation="2" result="glow" />
      <feComposite in="SourceGraphic" in2="glow" operator="over" />
    </filter>

    <!-- Soft blur for background wave -->
    <filter id="softWave">
      <feGaussianBlur stdDeviation="1" />
    </filter>
  </defs>

