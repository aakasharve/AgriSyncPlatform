<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 100" fill="none">
  <defs>
    <linearGradient id="qi-green" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="qi-blue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E88E5"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
    <linearGradient id="qi-amber" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
    <linearGradient id="qi-teal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#14B8A6"/>
      <stop offset="100%" stop-color="#0D9488"/>
    </linearGradient>
    <filter id="qi-shadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Q1: WHY — Lightbulb (insight) -->
  <g transform="translate(10, 10)" filter="url(#qi-shadow)">
    <circle cx="40" cy="40" r="38" fill="#ECFDF5" stroke="#059669" stroke-width="2"/>
    <!-- Bulb -->
    <path d="M32,28 C32,20 36,14 40,14 C44,14 48,20 48,28 C48,34 46,38 44,40 L36,40 C34,38 32,34 32,28 Z" fill="url(#qi-green)"/>
    <!-- Bulb base -->
    <rect x="36" y="40" width="8" height="6" rx="1" fill="#78350F"/>
    <!-- Light rays -->
    <line x1="40" y1="6" x2="40" y2="10" stroke="#059669" stroke-width="2" stroke-linecap="round"/>
    <line x1="54" y1="16" x2="51" y2="19" stroke="#059669" stroke-width="2" stroke-linecap="round"/>
    <line x1="26" y1="16" x2="29" y2="19" stroke="#059669" stroke-width="2" stroke-linecap="round"/>
    <line x1="22" y1="28" x2="26" y2="28" stroke="#059669" stroke-width="2" stroke-linecap="round"/>
    <line x1="54" y1="28" x2="58" y2="28" stroke="#059669" stroke-width="2" stroke-linecap="round"/>
    <!-- Sparkle -->
    <text x="26" y="60" font-family="system-ui" font-size="10" fill="#059669" font-weight="700" text-anchor="middle" transform="translate(14,0)">WHY</text>
  </g>

  <!-- Q2: WHAT — Gears (change mechanism) -->
  <g transform="translate(110, 10)" filter="url(#qi-shadow)">
    <circle cx="40" cy="40" r="38" fill="#EFF6FF" stroke="#1565C0" stroke-width="2"/>
    <!-- Large gear -->
    <circle cx="35" cy="35" r="14" fill="none" stroke="url(#qi-blue)" stroke-width="3"/>
    <circle cx="35" cy="35" r="5" fill="url(#qi-blue)"/>
    <!-- Gear teeth -->
    <rect x="33" y="18" width="4" height="6" rx="1" fill="url(#qi-blue)"/>
    <rect x="33" y="46" width="4" height="6" rx="1" fill="url(#qi-blue)"/>
    <rect x="18" y="33" width="6" height="4" rx="1" fill="url(#qi-blue)"/>
    <rect x="46" y="33" width="6" height="4" rx="1" fill="url(#qi-blue)"/>
    <!-- Small gear -->
    <circle cx="52" cy="50" r="9" fill="none" stroke="url(#qi-blue)" stroke-width="2.5"/>
    <circle cx="52" cy="50" r="3" fill="url(#qi-blue)"/>
    <text x="26" y="72" font-family="system-ui" font-size="10" fill="#1565C0" font-weight="700" text-anchor="middle" transform="translate(14,0)">WHAT</text>
  </g>

  <!-- Q3: WHO — People (personas) -->
  <g transform="translate(210, 10)" filter="url(#qi-shadow)">
    <circle cx="40" cy="40" r="38" fill="#FFFBEB" stroke="#D97706" stroke-width="2"/>
    <!-- Person 1 (center, larger) -->
    <circle cx="40" cy="26" r="8" fill="url(#qi-amber)"/>
    <path d="M28,48 C28,38 34,34 40,34 C46,34 52,38 52,48" fill="url(#qi-amber)"/>
    <!-- Person 2 (left, smaller) -->
    <circle cx="24" cy="32" r="6" fill="#D97706" opacity="0.6"/>
    <path d="M16,48 C16,42 20,38 24,38 C28,38 32,42 32,48" fill="#D97706" opacity="0.6"/>
    <!-- Person 3 (right, smaller) -->
    <circle cx="56" cy="32" r="6" fill="#D97706" opacity="0.6"/>
    <path d="M48,48 C48,42 52,38 56,38 C60,38 64,42 64,48" fill="#D97706" opacity="0.6"/>
    <text x="26" y="72" font-family="system-ui" font-size="10" fill="#D97706" font-weight="700" text-anchor="middle" transform="translate(14,0)">WHO</text>
  </g>

  <!-- Q4: WHEN — Clock/Sun (timing) -->
  <g transform="translate(310, 10)" filter="url(#qi-shadow)">
    <circle cx="40" cy="40" r="38" fill="#ECFDF5" stroke="#0D9488" stroke-width="2"/>
    <!-- Sun -->
    <circle cx="40" cy="32" r="12" fill="url(#qi-teal)"/>
    <!-- Sun rays -->
    <line x1="40" y1="14" x2="40" y2="18" stroke="#0D9488" stroke-width="2" stroke-linecap="round"/>
    <line x1="40" y1="46" x2="40" y2="50" stroke="#0D9488" stroke-width="2" stroke-linecap="round"/>
    <line x1="22" y1="32" x2="26" y2="32" stroke="#0D9488" stroke-width="2" stroke-linecap="round"/>
    <line x1="54" y1="32" x2="58" y2="32" stroke="#0D9488" stroke-width="2" stroke-linecap="round"/>
    <line x1="28" y1="20" x2="31" y2="23" stroke="#0D9488" stroke-width="2" stroke-linecap="round"/>
    <line x1="49" y1="41" x2="52" y2="44" stroke="#0D9488" stroke-width="2" stroke-linecap="round"/>
    <line x1="52" y1="20" x2="49" y2="23" stroke="#0D9488" stroke-width="2" stroke-linecap="round"/>
    <line x1="28" y1="44" x2="31" y2="41" stroke="#0D9488" stroke-width="2" stroke-linecap="round"/>
    <!-- Horizon line -->
    <path d="M20,52 Q30,48 40,52 Q50,56 60,52" stroke="#0D9488" stroke-width="1.5" fill="none" opacity="0.4"/>
    <text x="26" y="72" font-family="system-ui" font-size="10" fill="#0D9488" font-weight="700" text-anchor="middle" transform="translate(14,0)">WHEN</text>
  </g>

  <!-- Q5: HOW — Steps/Flow (process) -->
  <g transform="translate(410, 10)" filter="url(#qi-shadow)">
    <circle cx="40" cy="40" r="38" fill="#ECFDF5" stroke="#059669" stroke-width="2"/>
    <!-- Step 1 -->
    <circle cx="22" cy="25" r="6" fill="url(#qi-green)" opacity="0.5"/>
    <text x="22" y="28" font-family="system-ui" font-size="9" fill="white" font-weight="700" text-anchor="middle">1</text>
    <!-- Arrow -->
    <path d="M30,25 L35,32" stroke="#059669" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Step 2 -->
    <circle cx="40" cy="36" r="7" fill="url(#qi-green)" opacity="0.7"/>
    <text x="40" y="39" font-family="system-ui" font-size="9" fill="white" font-weight="700" text-anchor="middle">2</text>
    <!-- Arrow -->
    <path d="M48,38 L54,44" stroke="#059669" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Step 3 -->
    <circle cx="58" cy="48" r="8" fill="url(#qi-green)"/>
    <text x="58" y="52" font-family="system-ui" font-size="10" fill="white" font-weight="700" text-anchor="middle">3</text>
    <!-- Check at end -->
    <path d="M22,50 L26,54 L34,46" stroke="#059669" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.4"/>
    <text x="26" y="72" font-family="system-ui" font-size="10" fill="#059669" font-weight="700" text-anchor="middle" transform="translate(14,0)">HOW</text>
  </g>
</svg>