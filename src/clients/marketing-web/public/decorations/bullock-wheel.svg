<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Iron outer rim -->
  <circle cx="60" cy="60" r="54" stroke="#3d1f08" stroke-width="5"/>
  <!-- Wooden inner rim with grain texture -->
  <circle cx="60" cy="60" r="50" stroke="#6b3e1e" stroke-width="2.5"/>
  <circle cx="60" cy="60" r="46" stroke="#5c2e0a" stroke-width="1" stroke-dasharray="3 9" opacity="0.5"/>
  <!-- Hub (center) -->
  <circle cx="60" cy="60" r="9" fill="#78350F" stroke="#3d1f08" stroke-width="2.5"/>
  <circle cx="60" cy="60" r="4" fill="#4a1f05"/>
  <!-- 8 spokes with wood grain -->
  <line x1="60" y1="6" x2="60" y2="51" stroke="#7c4a25" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="60" y1="69" x2="60" y2="114" stroke="#7c4a25" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="6" y1="60" x2="51" y2="60" stroke="#7c4a25" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="69" y1="60" x2="114" y2="60" stroke="#7c4a25" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Diagonal spokes -->
  <line x1="22" y1="22" x2="53" y2="53" stroke="#7c4a25" stroke-width="3" stroke-linecap="round"/>
  <line x1="67" y1="67" x2="98" y2="98" stroke="#7c4a25" stroke-width="3" stroke-linecap="round"/>
  <line x1="98" y1="22" x2="67" y2="53" stroke="#7c4a25" stroke-width="3" stroke-linecap="round"/>
  <line x1="53" y1="67" x2="22" y2="98" stroke="#7c4a25" stroke-width="3" stroke-linecap="round"/>
  <!-- Forge marks on outer rim -->
  <circle cx="60" cy="6" r="2.5" fill="#3d1f08"/>
  <circle cx="60" cy="114" r="2.5" fill="#3d1f08"/>
  <circle cx="6" cy="60" r="2.5" fill="#3d1f08"/>
  <circle cx="114" cy="60" r="2.5" fill="#3d1f08"/>
  <circle cx="22" cy="22" r="2" fill="#3d1f08"/>
  <circle cx="98" cy="98" r="2" fill="#3d1f08"/>
  <circle cx="98" cy="22" r="2" fill="#3d1f08"/>
  <circle cx="22" cy="98" r="2" fill="#3d1f08"/>
</svg>
