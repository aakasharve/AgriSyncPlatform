    - productName: "phosphoric acid"
      rawProductName: "फॉस्फोरिक ॲसिड"
  expenses:
    - amount: 500
      currency: "INR"
      category: "diesel"
  machinery:
    - implement: "blower"
      nozzlesActive: 10
      fanState: "off"

