    - productName: "Alphamethrin"
      rawProductName: "अल्फामेथ्रिन"
      chemicalClass: "insecticide"
    - productName: "Bavistin"
      rawProductName: "बाविस्टीन"
      chemicalClass: "fungicide"

tolerances:
  "inputs[0].productName":
    oneOf:
      - "Alphamethrin"
      - "alphamethrin"
      - "alpha-cypermethrin"
      - "अल्फामेथ्रिन"
  "inputs[0].chemicalClass":
    oneOf:
      - "insecticide"
      - "pyrethroid"
      - "pyrethroid insecticide"
  "inputs[1].productName":
    oneOf:
      - "Bavistin"
      - "bavistin"
      - "carbendazim"
      - "Carbendazim"
      - "बाविस्टीन"
  "inputs[1].chemicalClass":
    oneOf:
      - "fungicide"
      - "systemic fungicide"

ignore_fields:
