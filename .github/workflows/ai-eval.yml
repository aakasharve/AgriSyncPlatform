name: ai-eval

on:
  pull_request:
    branches: [main, akash_edits]
    paths:
      - 'src/clients/mobile-web/src/infrastructure/ai/**'
      - 'src/clients/mobile-web/src/domain/schemas/**'
      - '_COFOUNDER/eval/**'
  schedule:
    - cron: "0 4 * * *"  # Nightly 04:00 UTC
  workflow_dispatch:
    inputs:
      mode:
        description: "full or smoke"
        default: "smoke"

jobs:
  ai-eval-smoke:
    name: AI Eval (Smoke — 10 cases)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: src/clients/mobile-web/package-lock.json

      - name: Install deps
        run: npm ci
        working-directory: src/clients/mobile-web

      - name: Run smoke eval (10 cases)
        working-directory: src/clients/mobile-web
        # GEMINI_API_KEY (no VITE_ prefix): this is a Node ts-node CLI
        # runner that calls Gemini directly to measure parse quality on
        # golden cases. It is CI-only and never bundled into mobile-web
        # — the dist-grep step in dotnet-ci.yml + the vite.config.ts
        # assertNoForbiddenEnv guard both still enforce zero browser-
        # exposure of any Gemini key. See ADR-DS-004 §AI-Eval Exception
        # for the architectural rationale.
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          EVAL_MODE: smoke
          EVAL_MAX_CASES: "10"
        run: |
          if [ -f "_COFOUNDER/eval/run.ts" ]; then
            npx ts-node _COFOUNDER/eval/run.ts --mode smoke --max-cases 10
          else
            echo "::warning::AI eval runner not yet authored (_COFOUNDER/eval/run.ts missing). Skipping smoke eval."
          fi

  ai-eval-full:
    name: AI Eval (Full — on AI file changes or nightly)
    runs-on: ubuntu-22.04
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: src/clients/mobile-web/package-lock.json

      - name: Install deps
        run: npm ci
        working-directory: src/clients/mobile-web

      - name: Run full eval
        working-directory: src/clients/mobile-web
        # GEMINI_API_KEY (no VITE_ prefix): see comment on smoke job above.
        # CI-only Node ts-node runner; never bundled into mobile-web.
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          EVAL_MODE: full
        run: |
          if [ -f "_COFOUNDER/eval/run.ts" ]; then
            npx ts-node _COFOUNDER/eval/run.ts --mode full
          else
            echo "::warning::AI eval runner (_COFOUNDER/eval/run.ts) not yet authored. Skipping full eval."
          fi

      - name: Upload eval results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-eval-results-${{ github.run_id }}
          path: _COFOUNDER/eval/runs/
          if-no-files-found: warn
