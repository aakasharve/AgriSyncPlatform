name: dotnet-ci

on:
  workflow_dispatch:   # manual-only until CI infra is ready

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
          cache: true
          cache-dependency-path: |
            **/*.csproj
            **/packages.lock.json

      - name: Restore
        run: dotnet restore src/AgriSync.sln

      - name: Build
        run: dotnet build src/AgriSync.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test src/AgriSync.sln --configuration Release --no-build --verbosity normal


