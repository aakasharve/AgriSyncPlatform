name: dotnet-ci

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - '.github/workflows/dotnet-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - '.github/workflows/dotnet-ci.yml'
  workflow_dispatch:

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
          cache: true
          cache-dependency-path: |
            **/*.csproj
            **/packages.lock.json

      - name: Restore
        run: dotnet restore src/AgriSync.sln

      - name: Build
        run: dotnet build src/AgriSync.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test src/AgriSync.sln --configuration Release --no-build --verbosity normal

  mobile-web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/clients/mobile-web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: src/clients/mobile-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  marketing-web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/clients/marketing-web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: src/clients/marketing-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Astro typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build


