name: dotnet-ci

on:
  push:
    branches: [main, akash_edits]
    paths:
      - 'src/**'
      - '.github/workflows/dotnet-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - '.github/workflows/dotnet-ci.yml'
  workflow_dispatch:

jobs:
  build-test:
    runs-on: ubuntu-latest

    # Postgres service: ShramSafal.Admin.IntegrationTests' AdminTestFixture
    # connects via ADMIN_TESTS_ADMIN_ROOT_CONN (default points at the dev
    # box's localhost:5433 with password akash123). On the runner, we run
    # postgres:16 as a service container, expose the standard 5432 to
    # localhost:5433 (matching local convention), and override the env var
    # so the fixture finds it.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: akash123
          POSTGRES_DB: postgres
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      # Match AdminTestFixture.DefaultRootConnectionString verbatim — keeps
      # CI green even if a future test reads the env var directly.
      ADMIN_TESTS_ADMIN_ROOT_CONN: "Host=localhost;Port=5433;Database=postgres;Username=postgres;Password=akash123"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
          cache: true
          cache-dependency-path: |
            **/*.csproj
            **/packages.lock.json

      - name: Restore
        run: dotnet restore src/AgriSync.sln

      - name: Build (warnings = errors)
        # Existing pre-existing warning codes are listed in
        # src/Directory.Build.props WarningsNotAsErrors so today's debt
        # stays visible-as-warnings while NEW codes fail. Sub-plan 03
        # drives the list to empty.
        run: dotnet build src/AgriSync.sln --configuration Release --no-restore /warnaserror

      - name: Format check
        # T-IGH-01-FORMAT — fails the build if any C# file in the
        # solution drifts from `dotnet format`'s normalised output.
        # Severity is `warn` so style-rule warnings (IDE0xxx /
        # whitespace) gate; only `error`-severity rules would gate at
        # `--severity error`. Re-add this step alongside any new
        # solution-wide formatting decision (e.g. tabs-vs-spaces,
        # max-line-length) by editing `.editorconfig`, not by skipping
        # this step.
        run: dotnet format src/AgriSync.sln --verify-no-changes --severity warn

      - name: Wait for Postgres
        # Defense-in-depth on top of the service container's --health-cmd:
        # pg_isready returns 0 only when the server is accepting connections.
        # Surfacing this as a distinct step gives a clean error if the
        # service container fails to come up.
        run: |
          for i in {1..30}; do
            if pg_isready -h localhost -p 5433 -U postgres; then
              echo "Postgres ready after ${i} attempts."
              exit 0
            fi
            sleep 2
          done
          echo "::error::Postgres did not become ready within 60s."
          exit 1

      - name: Test
        run: dotnet test src/AgriSync.sln --configuration Release --no-build --verbosity normal --logger "trx;LogFileName=results.trx" --results-directory ./TestResults

      - name: Assert no skipped tests
        shell: bash
        run: |
          set -euo pipefail
          trx=./TestResults/results.trx
          if [ ! -f "$trx" ]; then
            echo "::warning::No TRX file produced; skipped-test assertion bypassed."
            exit 0
          fi

          skipped=$(python3 - "$trx" <<'PY'
          import sys
          import xml.etree.ElementTree as ET

          root = ET.parse(sys.argv[1]).getroot()

          for node in root.iter():
              if node.tag.rsplit("}", 1)[-1] != "Counters":
                  continue

              raw = node.attrib.get("notExecuted") or node.attrib.get("skipped")
              if raw is None:
                  print("Counters element has no notExecuted/skipped attribute.", file=sys.stderr)
                  sys.exit(1)

              print(int(raw))
              sys.exit(0)

          print("Counters element not found in TRX.", file=sys.stderr)
          sys.exit(1)
          PY
          )

          echo "Skipped: ${skipped:-0}"
          if [ "${skipped:-0}" -gt 0 ]; then
            echo "::warning::Tests skipped: $skipped (acceptable up to sub-plan 05; tighten to 0 then)"
          fi

  mobile-web:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          # Mobile-web's PayloadValidator (Sub-plan 02 Task 9) imports from
          # sync-contract/schemas/payloads/*.zod.ts, and those files import
          # 'zod'. With strict TS resolution that means sync-contract's
          # node_modules must be populated for tsc/build to succeed —
          # cache both lockfiles, install both before the type/build pass.
          cache-dependency-path: |
            src/clients/mobile-web/package-lock.json
            sync-contract/package-lock.json

      - name: Install sync-contract deps
        run: npm ci
        working-directory: sync-contract

      - name: Install mobile-web deps
        run: npm ci
        working-directory: src/clients/mobile-web

      # DWC v2 §2.7 — fail the build if the C# EventVocabulary registry
      # and the mobile-web Zod EventSchemas registry drift apart. The
      # script is dependency-free node, so it runs before the more
      # expensive tsc / build steps. Lives at .github/scripts/ because
      # the repo's /scripts/ is gitignored for personal scratch use.
      - name: Event vocabulary parity (C# <-> TS)
        run: node .github/scripts/check-event-vocabulary-parity.mjs

      - name: TypeScript check
        run: npx tsc --noEmit
        working-directory: src/clients/mobile-web

      - name: Build
        run: npm run build
        working-directory: src/clients/mobile-web

  marketing-web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/clients/marketing-web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: src/clients/marketing-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Astro typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build


