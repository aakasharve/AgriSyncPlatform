name: dotnet-ci

on:
  push:
    branches: [main, akash_edits]
    paths:
      - 'src/**'
      - '.github/workflows/dotnet-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - '.github/workflows/dotnet-ci.yml'
  workflow_dispatch:

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
          cache: true
          cache-dependency-path: |
            **/*.csproj
            **/packages.lock.json

      - name: Restore
        run: dotnet restore src/AgriSync.sln

      - name: Build (warnings = errors)
        # Existing pre-existing warning codes are listed in
        # src/Directory.Build.props WarningsNotAsErrors so today's debt
        # stays visible-as-warnings while NEW codes fail. Sub-plan 03
        # drives the list to empty.
        run: dotnet build src/AgriSync.sln --configuration Release --no-restore /warnaserror

      - name: Test
        run: dotnet test src/AgriSync.sln --configuration Release --no-build --verbosity normal --logger "trx;LogFileName=results.trx" --results-directory ./TestResults

      - name: Assert no skipped tests
        shell: bash
        run: |
          set -e
          if [ -f ./TestResults/results.trx ]; then
            skipped=$(grep -oE 'failed="[0-9]+" passed="[0-9]+" skipped="[0-9]+"' ./TestResults/results.trx | grep -oE 'skipped="[0-9]+"' | head -1 | tr -d 'a-z="')
            echo "Skipped: ${skipped:-0}"
            if [ -n "$skipped" ] && [ "$skipped" -gt 0 ]; then
              echo "::warning::Tests skipped: $skipped (acceptable up to sub-plan 05; tighten to 0 then)"
            fi
          else
            echo "::warning::No TRX file produced; skipped-test assertion bypassed."
          fi

  mobile-web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/clients/mobile-web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: src/clients/mobile-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  marketing-web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/clients/marketing-web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: src/clients/marketing-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Astro typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build


