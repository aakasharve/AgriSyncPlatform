name: frontend-ci

on:
  push:
    branches: [main]
    paths:
      - 'src/clients/**'
      - 'sync-contract/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/clients/**'
      - 'sync-contract/**'
      - '.github/workflows/frontend-ci.yml'
  workflow_dispatch:

jobs:
  mobile-web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            src/clients/mobile-web/package-lock.json
            sync-contract/package-lock.json

      - name: Install sync-contract deps
        run: npm ci
        working-directory: sync-contract

      - name: Install mobile-web deps
        run: npm ci
        working-directory: src/clients/mobile-web

      # DWC v2 §2.7 — fail the build if the C# EventVocabulary registry
      # and the mobile-web Zod EventSchemas registry drift apart. The
      # script is dependency-free node, so it runs before the more
      # expensive tsc / build steps. Lives at .github/scripts/ because
      # the repo's /scripts/ is gitignored for personal scratch use.
      - name: Event vocabulary parity (C# <-> TS)
        run: node .github/scripts/check-event-vocabulary-parity.mjs

      - name: TypeScript check
        run: npx tsc --noEmit
        working-directory: src/clients/mobile-web

      - name: Unit tests (vitest)
        run: npm test
        working-directory: src/clients/mobile-web

      - name: Build
        run: npm run build
        working-directory: src/clients/mobile-web

      # DATA_PRINCIPLE_SPINE sub-phase 05.1.4 — fail the build if the
      # browser-direct Gemini URL leaks into the production bundle.
      # CoVeWrapper.ts was rewired to call /shramsafal/ai/cove-reverify
      # in 05.1.2; vite.config.ts blocks VITE_GEMINI_API_KEY at build
      # time; this grep is the third defence — it catches code that
      # hard-codes the host literal regardless of env vars.
      - name: Grep dist/ for direct Gemini URLs
        run: |
          if grep -RIn "generativelanguage.googleapis.com" src/clients/mobile-web/dist/; then
            echo "FAIL: direct Gemini URL leaked into production bundle. AI calls must route through the backend (ADR-DS-004)."
            exit 1
          fi
          echo "OK: no direct Gemini URLs in dist/."

  marketing-web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/clients/marketing-web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: src/clients/marketing-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Astro typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

  frontend-arch-test:
    name: Frontend Layer Tests
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: src/clients/mobile-web/package-lock.json

      - name: Install deps
        run: npm ci
        working-directory: src/clients/mobile-web

      - name: Frontend layer violation scan
        run: |
          node -e "
          const { execSync } = require('child_process');
          try {
            const result = execSync(
              'grep -rn --include=*.ts --include=*.tsx ' +
              '-E \"from [^;]*(infrastructure|/pages/|/features/)\" ' +
              'src/clients/mobile-web/src/domain/ || true'
            ).toString();
            if (result.trim()) {
              console.error('Frontend layer violation detected:');
              console.error(result);
              process.exit(1);
            }
            console.log('Frontend layer check: OK');
          } catch(e) {
            console.error(e.message);
            process.exit(1);
          }
          "
