name: sync-contract

# Sub-plan 02 Task 10: regen + diff gate for the canonical sync mutation
# contract, plus cross-language contract tests. Triggers on every push
# that touches the source-of-truth JSON, the generated outputs, or the
# workflow file itself. PRs to main are also gated.
#
# regen-and-diff: `npm run validate` + `npm run generate`, then asserts
# `git status --porcelain` is clean for the two emitted catalog files.
# A non-empty diff means someone hand-edited the generated file or
# forgot to regenerate after editing mutation-types.json — both are
# invariant violations.
#
# contract-tests: in-package vitest, mobile-web SyncMutationCatalog
# contract test (4 tests), backend xUnit Category=Contract tests (3).

on:
  push:
    branches: [main, akash_edits]
    paths:
      - 'sync-contract/**'
      - 'src/clients/mobile-web/src/infrastructure/sync/SyncMutationCatalog.ts'
      - 'src/apps/ShramSafal/ShramSafal.Application/Contracts/Sync/SyncMutationCatalog.cs'
      - '.github/workflows/sync-contract.yml'
  pull_request:
    # Sub-plan 04 close-out — also gate PRs targeting akash_edits.
    branches: [main, akash_edits]
    paths:
      - 'sync-contract/**'
      - 'src/clients/mobile-web/src/infrastructure/sync/SyncMutationCatalog.ts'
      - 'src/apps/ShramSafal/ShramSafal.Application/Contracts/Sync/SyncMutationCatalog.cs'
      - '.github/workflows/sync-contract.yml'
  workflow_dispatch:

jobs:
  regen-and-diff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: sync-contract/package-lock.json

      - name: Install sync-contract deps
        run: npm ci
        working-directory: sync-contract

      - name: Validate mutation-types.json
        run: npm run validate
        working-directory: sync-contract

      - name: TypeScript compile check (sync-contract)
        run: npm run typecheck
        working-directory: sync-contract

      - name: Regenerate TS + C# catalogs
        run: npm run generate
        working-directory: sync-contract

      - name: Fail if generated outputs differ from committed
        shell: bash
        run: |
          set -euo pipefail
          changed=$(git status --porcelain | grep -E "(SyncMutationCatalog\.(ts|cs))$" || true)
          if [ -n "$changed" ]; then
            echo "::error::Regenerated SyncMutationCatalog differs from committed copy:"
            echo "$changed"
            git --no-pager diff -- "**/SyncMutationCatalog.ts" "**/SyncMutationCatalog.cs"
            exit 1
          fi
          echo "OK — generated outputs match committed."

  contract-tests:
    runs-on: ubuntu-latest
    needs: regen-and-diff
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            sync-contract/package-lock.json
            src/clients/mobile-web/package-lock.json
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
          cache: true
          cache-dependency-path: |
            **/*.csproj
            **/packages.lock.json

      - name: Install sync-contract deps
        run: npm ci
        working-directory: sync-contract

      - name: Install mobile-web deps
        run: npm ci
        working-directory: src/clients/mobile-web

      - name: sync-contract smoke tests
        run: npm test
        working-directory: sync-contract

      - name: mobile-web SyncMutationCatalog contract test
        run: npx vitest run src/infrastructure/sync/__tests__/SyncMutationCatalog.contract.test.ts
        working-directory: src/clients/mobile-web

      - name: dotnet restore
        run: dotnet restore src/AgriSync.sln

      - name: dotnet contract tests
        # Category=Contract tests are pure file-system reads; no Postgres
        # service needed here (unlike the full dotnet-ci.yml suite).
        run: dotnet test src/tests/ShramSafal.Sync.IntegrationTests/ --filter "Category=Contract" --configuration Release --no-restore
