name: eslint

on:
  push:
    branches: [main, akash_edits]
    paths:
      - 'src/clients/mobile-web/**'
      - 'src/clients/admin-web/**'
      - '.github/workflows/eslint.yml'
  pull_request:
    # Sub-plan 04 close-out — also gate PRs that target akash_edits so
    # the integration branch's mid-cycle PRs (e.g. claude/sp04-frontend)
    # surface their lint + size + storage-discipline checks before merge.
    branches: [main, akash_edits]
    paths:
      - 'src/clients/mobile-web/**'
      - 'src/clients/admin-web/**'
      - '.github/workflows/eslint.yml'
  workflow_dispatch:

jobs:
  mobile-web-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/clients/mobile-web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: src/clients/mobile-web/package-lock.json
      - run: npm ci
      # T-IGH-04-LINT-RATCHET — ratchet floor. 9999 → 600 → 400. Wave 1
       # cleared 11 react-hooks/rules-of-hooks bugs (real bugs in
       # ComparePage hoist) + 188 unused-imports auto-removed via the new
       # eslint-plugin-unused-imports plugin. Subsequent waves will drive
       # to 100, then 50, then 0.
      - run: npx eslint --max-warnings 400 "src/**/*.{ts,tsx}"
      - run: npm run check:file-sizes
      # Sub-plan 04 Task 3 — localStorage architecture gate (strict; fails on
      # any new violation outside the named allow-list).
      - run: npm run check:storage-discipline

  admin-web-lint:
    runs-on: ubuntu-latest
    # No if-guard: hashFiles() is a step-time function (the runner's
    # workspace doesn't exist at job-evaluation time, which causes the
    # whole workflow to fail YAML validation with "Unrecognized function:
    # hashFiles"). admin-web's package.json has shipped; the conditional
    # was defensive scaffolding from before that and broke the workflow.
    defaults:
      run:
        working-directory: src/clients/admin-web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: src/clients/admin-web/package-lock.json
      - run: npm ci
      - run: npx eslint --max-warnings 9999 .
