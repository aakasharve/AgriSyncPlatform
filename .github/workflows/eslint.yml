name: eslint

on:
  push:
    branches: [main, akash_edits]
    paths:
      - 'src/clients/mobile-web/**'
      - 'src/clients/admin-web/**'
      - '.github/workflows/eslint.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/clients/mobile-web/**'
      - 'src/clients/admin-web/**'
      - '.github/workflows/eslint.yml'
  workflow_dispatch:

jobs:
  mobile-web-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/clients/mobile-web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: src/clients/mobile-web/package-lock.json
      - run: npm ci
      # Sub-plan 04 will tighten max-warnings; today we only fail on errors.
      - run: npx eslint --max-warnings 9999 "src/**/*.{ts,tsx}"

  admin-web-lint:
    runs-on: ubuntu-latest
    if: ${{ hashFiles('src/clients/admin-web/package.json') != '' }}
    defaults:
      run:
        working-directory: src/clients/admin-web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: src/clients/admin-web/package-lock.json
      - run: npm ci
      - run: npx eslint --max-warnings 9999 "src/**/*.{ts,tsx}" || true
