name: keystore-change-guard

# Fires a loud, visible WARNING whenever the Android release signing keystore
# is changed on a push or pull request. The keystore is a sensitive credential:
# the PRODUCTION signing key is the GitHub secret KEYSTORE_BASE64 (android-release.yml
# overwrites the committed file with it at build time). Changing the signing key
# incorrectly can break Play Store updates for the published app.
#
# This guard does NOT block — it surfaces the change so it is never silent.

on:
  push:
    paths:
      - 'src/clients/mobile-web/android/app/shramsafal-release.keystore'
      - '**/*.keystore'
      - '**/*.jks'
  pull_request:
    paths:
      - 'src/clients/mobile-web/android/app/shramsafal-release.keystore'
      - '**/*.keystore'
      - '**/*.jks'

jobs:
  warn:
    name: Warn on signing keystore change
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Emit keystore-change warning
        run: |
          KS="src/clients/mobile-web/android/app/shramsafal-release.keystore"
          echo "::warning title=Release signing keystore changed::The Android release signing keystore was modified. PRODUCTION signing uses the GitHub secret KEYSTORE_BASE64 (it overwrites the committed file at build time). If you intend to change the REAL signing key you MUST also update the KEYSTORE_BASE64 secret to match — otherwise Play Store updates can break. Confirm this change was intentional."
          {
            echo "## ⚠️ Release signing keystore changed"
            echo ""
            echo "A change to a \`.keystore\`/\`.jks\` file was detected in this push/PR."
            echo ""
            echo "**Why this matters:** the app's release signing key is what Google Play uses to"
            echo "confirm an update really comes from you. It must stay consistent forever, or"
            echo "updates to the published app can break."
            echo ""
            echo "**Where the real key lives:** the GitHub Actions secret \`KEYSTORE_BASE64\`."
            echo "\`android-release.yml\` decodes that secret over the committed file before signing,"
            echo "so the committed \`$KS\` only affects **local** builds."
            echo ""
            echo "**If this change was intentional:** also update the \`KEYSTORE_BASE64\` secret so"
            echo "local and production builds use the same key. If it was **not** intentional,"
            echo "revert the file (\`git checkout <last-good-sha> -- $KS\`)."
          } >> "$GITHUB_STEP_SUMMARY"
