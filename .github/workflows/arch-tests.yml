name: arch-tests

on:
  push:
    branches: [main, akash_edits]
    paths:
      - 'src/**'
      - '!src/clients/**'
      - '.github/workflows/arch-tests.yml'
  pull_request:
    branches: [main, akash_edits]
    paths:
      - 'src/**'
      - '!src/clients/**'
      - '.github/workflows/arch-tests.yml'
  workflow_dispatch:

jobs:
  dotnet-arch-tests:
    name: .NET Architecture Tests
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
          cache: true
          cache-dependency-path: |
            **/*.csproj
            **/packages.lock.json

      - name: Restore
        run: dotnet restore src/AgriSync.sln

      - name: Build
        run: dotnet build src/AgriSync.sln --configuration Release --no-restore

      - name: Run Architecture Tests
        run: dotnet test src/tests/AgriSync.ArchitectureTests/ --configuration Release --no-build --verbosity normal
        # Verifies: Domain depends on nothing infra; SharedKernel has no external deps;
        # Application depends on Domain + BuildingBlocks only; Api depends on Application only.
