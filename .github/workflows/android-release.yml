name: android-release

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: 'Version bump type (none | patch | minor)'
        required: false
        default: 'none'
  push:
    tags:
      - 'v*'

jobs:
  build-apk:
    name: Build & publish signed APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: src/clients/mobile-web/package-lock.json

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin

      # Use the pre-installed Android SDK on ubuntu-latest
      - name: Accept Android SDK licenses
        run: yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Install sync-contract deps (tolerant — lock omits Linux-only @emnapi optional deps)
        working-directory: sync-contract
        run: npm install --no-audit --no-fund

      - name: Install mobile-web deps
        working-directory: src/clients/mobile-web
        run: npm ci

      - name: Build web assets
        working-directory: src/clients/mobile-web
        run: npm run build

      - name: Cap sync android
        working-directory: src/clients/mobile-web
        run: npx cap sync android

      - name: Decode keystore from secret
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d \
            > src/clients/mobile-web/android/app/shramsafal-release.keystore
          echo "Keystore decoded: $(wc -c < src/clients/mobile-web/android/app/shramsafal-release.keystore) bytes"

      - name: Grant Gradle execute permission
        working-directory: src/clients/mobile-web/android
        run: chmod +x gradlew

      - name: Build signed release APK
        working-directory: src/clients/mobile-web/android
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon -q

      - name: Verify APK
        run: |
          APK=src/clients/mobile-web/android/app/build/outputs/apk/release/app-release.apk
          ls -lh "$APK"
          echo "APK_PATH=$APK" >> "$GITHUB_ENV"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Upload APK to S3 (versioned + latest + marketing site)
        run: |
          SHA_SHORT=$(git rev-parse --short HEAD)
          # app bucket — versioned + latest
          aws s3 cp "$APK_PATH" \
            "s3://shramsafal-app-prod/apk/shramsafal-${SHA_SHORT}.apk" \
            --content-type application/vnd.android.package-archive \
            --cache-control "max-age=31536000"
          aws s3 cp "$APK_PATH" \
            "s3://shramsafal-app-prod/apk/shramsafal-latest.apk" \
            --content-type application/vnd.android.package-archive \
            --cache-control "no-cache, no-store, must-revalidate"
          # marketing site — /download/ path so shramsafal.in/download/shramsafal-latest.apk works
          aws s3 cp "$APK_PATH" \
            "s3://shramsafal-marketing-prod/download/shramsafal-latest.apk" \
            --content-type application/vnd.android.package-archive \
            --cache-control "no-cache, no-store, must-revalidate"
          # Invalidate marketing site CloudFront for the download path
          aws cloudfront create-invalidation \
            --distribution-id E2M06A2B71ZW1O \
            --paths "/download/shramsafal-latest.apk" \
            --output text --query "Invalidation.Id"
          echo "✅ APK published:"
          echo "   Download: https://shramsafal.in/download/shramsafal-latest.apk"
          echo "   Versioned: https://app.shramsafal.in/apk/shramsafal-${SHA_SHORT}.apk"

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: shramsafal-release-apk
          path: src/clients/mobile-web/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
